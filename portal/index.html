<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Meu portal — Estúdio Gecê</title>
<link rel="icon" type="image/svg+xml" href="/assets/img/selo-fullcolor.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root { --bordeaux:#561624; --bordeaux-light:#7a2438; --cream:#FAF7F4; --ink:#211013; --muted:#8a7a7d; --line:#e8e0e1; --ok:#3f6b4f; --warn:#b3762c; --blue:#3d6b8a; --danger:#a13b3b; --radius:12px; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--ink); min-height:100vh; }
  .topbar { background:var(--bordeaux); color:#fff; }
  .topbar-inner { max-width:960px; margin:0 auto; padding:18px 24px; display:flex; align-items:center; justify-content:space-between; }
  .brand { display:flex; align-items:center; gap:12px; }
  .mark { width:38px; height:38px; object-fit:contain; display:block; }
  .brand .txt { font-size:14px; font-weight:600; letter-spacing:.04em; }
  .brand .txt span { display:block; font-size:11px; font-weight:400; opacity:.65; }
  .logout { font-family:inherit; font-size:12.5px; font-weight:500; color:rgba(255,255,255,.8); background:rgba(255,255,255,.1); border:none; border-radius:8px; padding:8px 14px; cursor:pointer; }
  .logout:hover { background:rgba(255,255,255,.2); color:#fff; }
  main { max-width:960px; margin:0 auto; padding:36px 24px 60px; }
  .hello { font-size:24px; font-weight:700; margin-bottom:4px; }
  .hello-sub { color:var(--muted); font-size:14px; margin-bottom:32px; }
  h2 { font-size:15px; font-weight:700; margin:32px 0 14px; }
  .proj { background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:22px 24px; margin-bottom:16px; }
  .proj-head { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom:14px; }
  .proj-title { font-size:18px; font-weight:700; }
  .proj-meta { font-size:12.5px; color:var(--muted); margin-top:3px; }
  .badge { font-size:11px; font-weight:600; padding:4px 11px; border-radius:20px; white-space:nowrap; }
  .badge.proposta { background:#eee7e8; color:var(--muted); }
  .badge.andamento { background:#e4ecf0; color:var(--blue); }
  .badge.pausado { background:#fbe9d9; color:var(--warn); }
  .badge.concluido { background:#e2ede5; color:var(--ok); }
  .badge.pendente { background:#fbe9d9; color:var(--warn); }
  .badge.atrasado { background:#f6dede; color:var(--danger); }
  .badge.pago { background:#e2ede5; color:var(--ok); }
  .proj-body { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; border-top:1px solid var(--line); padding-top:14px; }
  .kv .k { font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); font-weight:600; margin-bottom:3px; }
  .kv .v { font-size:14px; font-weight:500; }
  .list { background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:8px 22px; }
  .li { display:flex; justify-content:space-between; align-items:center; gap:12px; padding:14px 0; border-bottom:1px solid var(--line); font-size:14px; }
  .li:last-child { border-bottom:none; }
  .li .meta { color:var(--muted); font-size:12.5px; }
  .empty { background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:44px 24px; text-align:center; color:var(--muted); font-size:14px; }
  .empty strong { display:block; color:var(--ink); font-size:16px; font-weight:600; margin-bottom:6px; }
  .loading { text-align:center; color:var(--muted); padding:60px; font-size:14px; }
  /* Stepper de etapas */
  .stepper { display:flex; margin-top:16px; gap:4px; overflow-x:auto; padding-bottom:4px; }
  .step { flex:1 0 auto; min-width:74px; display:flex; flex-direction:column; align-items:center; gap:6px; position:relative; }
  .step .dot { width:14px; height:14px; border-radius:50%; background:var(--line); border:2px solid var(--line); z-index:1; }
  .step .lbl { font-size:10.5px; color:var(--muted); text-align:center; line-height:1.2; }
  .step::before { content:''; position:absolute; top:6px; left:-50%; width:100%; height:2px; background:var(--line); }
  .step:first-child::before { display:none; }
  .step.done .dot, .step.current .dot { background:var(--bordeaux); border-color:var(--bordeaux); }
  .step.done::before, .step.current::before { background:var(--bordeaux); }
  .step.current .dot { box-shadow:0 0 0 4px rgba(86,22,36,.15); }
  .step.current .lbl { color:var(--bordeaux); font-weight:700; }
  /* Resumo de parcelas */
  .pay-sum { display:flex; flex-wrap:wrap; gap:10px 24px; background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:14px 18px; font-size:13.5px; color:var(--muted); margin-bottom:12px; }
  .pay-sum strong { color:var(--ink); }
  @media (max-width:640px){ .proj-body{ grid-template-columns:1fr 1fr; } .step .lbl{ font-size:9px; } }
  /* Modal trocar senha */
  .overlay { position:fixed; inset:0; background:rgba(33,16,19,.42); display:flex; align-items:flex-start; justify-content:center; padding:60px 20px; z-index:50; overflow-y:auto; }
  .modal { background:#fff; border-radius:14px; width:100%; max-width:420px; box-shadow:0 30px 60px -30px rgba(86,22,36,.5); }
  .modal-head { display:flex; justify-content:space-between; align-items:center; padding:20px 24px; border-bottom:1px solid var(--line); }
  .modal-head h3 { font-size:17px; font-weight:700; }
  .modal-body { padding:22px 24px; }
  .modal .field { margin-bottom:14px; }
  .modal .field label { display:block; font-size:12.5px; font-weight:600; margin-bottom:6px; }
  .modal .field input { width:100%; font-family:inherit; font-size:15px; padding:10px 12px; border:1px solid var(--line); border-radius:var(--radius); }
  .modal .field input:focus { outline:none; border-color:var(--bordeaux); box-shadow:0 0 0 3px rgba(86,22,36,.1); }
  .modal .msg { font-size:13px; border-radius:var(--radius); padding:9px 12px; margin-bottom:14px; display:none; }
  .modal .msg.show { display:block; }
  .modal .msg.err { color:var(--danger); background:#f6dede; } .modal .msg.ok { color:var(--ok); background:#e2ede5; }
  .x-btn { background:none; border:none; font-size:16px; color:var(--muted); cursor:pointer; }
  .modal .actions { display:flex; justify-content:flex-end; gap:10px; margin-top:4px; }
  .modal .btn { font-family:inherit; font-size:14px; font-weight:600; background:var(--bordeaux); color:#fff; border:none; border-radius:var(--radius); padding:10px 18px; cursor:pointer; }
  .modal .btn.ghost { background:#fff; color:var(--ink); border:1px solid var(--line); }
</style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <img class="mark" src="/assets/img/selo-branca.svg" alt="Estúdio Gecê" />
        <div class="txt">ESTÚDIO GECÊ<span>Portal do cliente</span></div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="logout" id="trocarSenha">Trocar senha</button>
        <button class="logout" id="logout">Sair</button>
      </div>
    </div>
  </div>
  <main id="app"><div class="loading">Carregando…</div></main>
  <div id="modalRoot"></div>

<script>
  const BRL = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
  const money = v => BRL.format(Number(v) || 0);
  const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const linkHost = u => { try { return new URL(u).hostname.replace(/^www\./,''); } catch { return u; } };
  const today = () => { const d=new Date(); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); return d.toISOString().slice(0,10); };
  const fmtDate = iso => iso ? new Date(iso+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'}) : '—';
  const TIP = { residencial:'Residencial', comercial:'Comercial', comercial_especial:'Comercial especial', interiores:'Interiores', paisagistico:'Paisagístico', urbanistico:'Urbanístico', regularizacao:'Regularização', reforma:'Reforma', retrofit:'Retrofit', institucional:'Institucional', consultoria:'Consultoria' };
  const PST = { proposta:'Proposta', andamento:'Em andamento', pausado:'Pausado', concluido:'Concluído' };
  const EVT = { reuniao:'Reunião', visita:'Visita técnica', entrega:'Entrega', obra:'Obra', outro:'Compromisso' };
  const effFin = f => (f.status==='pendente' && f.vencimento && f.vencimento < today()) ? 'atrasado' : f.status;
  const FST = { pendente:'A pagar', pago:'Pago', atrasado:'Vencido' };
  const FASE = { levantamento:'Levantamento cadastral', estudo:'Estudo preliminar', anteprojeto:'Anteprojeto', basico:'Projeto básico', legal:'Projeto legal', executivo:'Projeto executivo', obra:'Acompanhamento / obra', entregue:'Entrega final' };
  const ETAPAS_ALL = ['levantamento','estudo','anteprojeto','basico','legal','executivo','obra','entregue'];
  const parseEtapas = v => { try { const a = JSON.parse(v); return Array.isArray(a) && a.length ? a : ETAPAS_ALL.slice(); } catch { return ETAPAS_ALL.slice(); } };
  const stepper = (fase, etapasRaw) => {
    const order = parseEtapas(etapasRaw);
    const idx = Math.max(0, order.indexOf(fase || order[0]));
    return `<div class="stepper">${order.map((f,i)=>`
      <div class="step${i<idx?' done':''}${i===idx?' current':''}"><span class="dot"></span><span class="lbl">${FASE[f]||f}</span></div>`).join('')}</div>`;
  };

  document.getElementById('logout').onclick = async () => {
    try { await fetch('/api/logout', { method:'POST' }); } catch {}
    location.href = '/login';
  };

  document.getElementById('trocarSenha').onclick = () => {
    const root = document.getElementById('modalRoot');
    const close = () => { root.innerHTML = ''; };
    root.innerHTML = `
      <div class="overlay" id="ov">
        <form class="modal" id="pwForm" autocomplete="off">
          <div class="modal-head"><h3>Trocar senha</h3><button type="button" class="x-btn" id="pwClose">✕</button></div>
          <div class="modal-body">
            <div class="msg" id="pwMsg"></div>
            <div class="field"><label>Senha atual</label><input type="password" id="atual" required autocomplete="current-password"></div>
            <div class="field"><label>Nova senha (mín. 6)</label><input type="password" id="nova" required minlength="6" autocomplete="new-password"></div>
            <div class="field"><label>Confirmar nova senha</label><input type="password" id="conf" required autocomplete="new-password"></div>
            <div class="actions">
              <button type="button" class="btn ghost" id="pwCancel">Cancelar</button>
              <button type="submit" class="btn" id="pwSave">Salvar</button>
            </div>
          </div>
        </form>
      </div>`;
    const msg = document.getElementById('pwMsg');
    document.getElementById('pwClose').onclick = close;
    document.getElementById('pwCancel').onclick = close;
    document.getElementById('ov').onclick = e => { if (e.target.id === 'ov') close(); };
    document.getElementById('pwForm').onsubmit = async e => {
      e.preventDefault();
      msg.className = 'msg';
      const atual = document.getElementById('atual').value;
      const nova = document.getElementById('nova').value;
      const conf = document.getElementById('conf').value;
      if (nova !== conf) { msg.textContent = 'A confirmação não confere.'; msg.className = 'msg err show'; return; }
      const btn = document.getElementById('pwSave'); btn.disabled = true; btn.textContent = 'Salvando…';
      try {
        const res = await fetch('/api/portal/senha', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ atual, nova }) });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.ok) {
          msg.textContent = 'Senha alterada com sucesso!'; msg.className = 'msg ok show';
          setTimeout(close, 1200);
        } else {
          msg.textContent = data.error || 'Não foi possível trocar a senha.'; msg.className = 'msg err show';
          btn.disabled = false; btn.textContent = 'Salvar';
        }
      } catch {
        msg.textContent = 'Erro de conexão.'; msg.className = 'msg err show';
        btn.disabled = false; btn.textContent = 'Salvar';
      }
    };
    document.getElementById('atual').focus();
  };

  (async () => {
    let d;
    try {
      const res = await fetch('/api/portal/data');
      if (res.status === 401) { location.href = '/login'; return; }
      d = await res.json();
    } catch {
      document.getElementById('app').innerHTML = '<div class="empty"><strong>Erro ao carregar.</strong>Tente recarregar a página.</div>';
      return;
    }

    const nome = (d.user && d.user.name) ? d.user.name.split(' ')[0] : 'Cliente';
    const projetos = d.projetos || [];
    const eventos = (d.eventos || []).filter(e => e.data >= today());
    const financeiro = d.financeiro || [];

    let html = `<div class="hello">Olá, ${esc(nome)} 👋</div>
      <div class="hello-sub">Acompanhe aqui o andamento dos seus projetos com o Estúdio Gecê.</div>`;

    html += `<h2>Seus projetos</h2>`;
    if (projetos.length) {
      html += projetos.map(p => `
        <div class="proj">
          <div class="proj-head">
            <div>
              <div class="proj-title">${esc(p.nome)}</div>
              <div class="proj-meta">${TIP[p.tipologia]||''}${p.local?(' · '+esc(p.local)):''}</div>
            </div>
            <span class="badge ${p.status||'proposta'}">${PST[p.status]||'—'}</span>
          </div>
          <div class="proj-body">
            <div class="kv"><div class="k">Etapa atual</div><div class="v">${FASE[p.fase]||FASE[parseEtapas(p.etapas)[0]]||'—'}</div></div>
            <div class="kv"><div class="k">Início</div><div class="v">${p.created_at?new Date(p.created_at).toLocaleDateString('pt-BR'):'—'}</div></div>
          </div>
          ${stepper(p.fase, p.etapas)}
          ${p.notas?`<div class="proj-meta" style="margin-top:14px">${esc(p.notas)}</div>`:''}
          ${(p.arquivos&&p.arquivos.length)?`
          <div style="margin-top:16px;border-top:1px solid var(--line);padding-top:14px">
            <div class="kv" style="margin-bottom:10px"><div class="k">Arquivos</div></div>
            ${p.arquivos.map(f => `
              <div class="li" style="padding:10px 0">
                <div><div>${esc(f.nome)}</div><div class="meta">${esc(linkHost(f.url))}</div></div>
                <a href="${esc(f.url)}" target="_blank" rel="noopener" style="color:var(--bordeaux);text-decoration:none;font-weight:600;font-size:13px">Abrir ↗</a>
              </div>`).join('')}
          </div>`:''}
        </div>`).join('');
    } else {
      html += `<div class="empty"><strong>Seus projetos aparecerão aqui em breve.</strong>Assim que o Estúdio Gecê vincular um projeto à sua conta, ele aparece nesta página.</div>`;
    }

    if (eventos.length) {
      html += `<h2>Próximos compromissos</h2><div class="list">` + eventos.map(e => `
        <div class="li">
          <div><div>${esc(e.titulo)}</div><div class="meta">${EVT[e.tipo]||''}${e.hora?(' · '+e.hora):''}</div></div>
          <div class="meta">${fmtDate(e.data)}</div>
        </div>`).join('') + `</div>`;
    }

    if (financeiro.length) {
      const totalP = financeiro.reduce((s,f)=>s+(Number(f.valor)||0),0);
      const pagoP = financeiro.filter(f=>f.status==='pago').reduce((s,f)=>s+(Number(f.valor)||0),0);
      const nPagas = financeiro.filter(f=>f.status==='pago').length;
      html += `<h2>Pagamentos</h2>
        <div class="pay-sum">
          <span><strong>${nPagas} de ${financeiro.length}</strong> parcelas pagas</span>
          <span>Recebido <strong>${money(pagoP)}</strong></span>
          <span>Falta <strong>${money(totalP-pagoP)}</strong></span>
        </div>
        <div class="list">` + financeiro.map(f => { const st=effFin(f); return `
        <div class="li">
          <div><div>${esc(f.descricao)}</div><div class="meta">Vencimento ${fmtDate(f.vencimento)}</div></div>
          <div style="display:flex;align-items:center;gap:12px">
            <span class="badge ${st}">${FST[st]||st}</span>
            <strong>${money(f.valor)}</strong>
          </div>
        </div>`; }).join('') + `</div>`;
    }

    document.getElementById('app').innerHTML = html;
  })();
</script>
</body>
</html>
