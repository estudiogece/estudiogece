<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Estúdio Gecê — Admin</title>
<link rel="icon" type="image/svg+xml" href="/assets/img/selo-fullcolor.svg">
<!-- PWA (iPhone/iPad) -->
<link rel="manifest" href="/manifest-admin.json">
<meta name="theme-color" content="#561624">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Gecê Admin">
<link rel="apple-touch-icon" href="/assets/img/icon-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<!-- Google Picker (seleção de arquivos/pastas do Drive) -->
<script src="https://apis.google.com/js/api.js" async defer></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bordeaux: #561624;
    --bordeaux-light: #7a2438;
    --cream: #FAF7F4;
    --ink: #211013;
    --muted: #8a7a7d;
    --line: #e8e0e1;
    --ok: #3f6b4f;
    --warn: #b3762c;
    --danger: #a13b3b;
    --blue: #3d6b8a;
    --radius: 10px;
    --shadow: 0 18px 40px -24px rgba(86,22,36,.45);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    display: flex;
    min-height: 100vh;
  }
  a { color: inherit; }

  /* Sidebar */
  .sidebar {
    width: 240px;
    background: var(--bordeaux);
    color: #fff;
    display: flex;
    flex-direction: column;
    padding: 28px 20px;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
  .logo-mark { width: 38px; height: 38px; object-fit: contain; display: block; }
  .logo-text { font-size: 14px; font-weight: 600; letter-spacing: 0.04em; }
  .logo-text span { display: block; font-size: 11px; font-weight: 400; opacity: 0.65; }
  nav { display: flex; flex-direction: column; gap: 4px; }
  nav a {
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    font-size: 14px; font-weight: 500;
    padding: 11px 14px;
    border-radius: var(--radius);
    display: flex; align-items: center; gap: 10px;
    transition: background 0.15s ease, color 0.15s ease;
  }
  nav a:hover { background: rgba(255,255,255,0.08); color: #fff; }
  nav a.active { background: #fff; color: var(--bordeaux); }
  nav a .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.5; }
  .sidebar-footer { margin-top: auto; font-size: 12px; color: rgba(255,255,255,0.5); padding-top: 20px; }
  .sidebar-footer .name { color: rgba(255,255,255,0.75); font-weight: 500; }
  .data-tools { display: flex; gap: 6px; margin-top: 14px; flex-wrap: wrap; }
  .data-tools button {
    font-family: inherit; font-size: 10.5px; letter-spacing: .04em; text-transform: uppercase;
    background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7);
    border: none; border-radius: 6px; padding: 6px 8px; cursor: pointer;
    transition: background .15s ease, color .15s ease;
  }
  .data-tools button:hover { background: rgba(255,255,255,0.16); color: #fff; }

  /* Main */
  main { flex: 1; padding: 36px clamp(20px, 3vw, 56px); max-width: 1800px; width: 100%; margin: 0 auto; }
  header.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; gap: 16px; flex-wrap: wrap; }
  header.topbar h1 { font-size: 22px; font-weight: 700; }
  .topbar-actions { display: flex; align-items: center; gap: 10px; }
  .date { font-size: 13px; color: var(--muted); }

  /* Buttons */
  .btn {
    font-family: inherit; font-size: 13.5px; font-weight: 600;
    background: var(--bordeaux); color: #fff;
    border: 1px solid var(--bordeaux); border-radius: var(--radius);
    padding: 10px 16px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 7px;
    transition: background .15s ease, transform .1s ease;
  }
  .btn:hover { background: var(--bordeaux-light); }
  .btn:active { transform: translateY(1px); }
  .btn.ghost { background: #fff; color: var(--bordeaux); }
  .btn.ghost:hover { background: #f3ebec; }
  .btn.sm { padding: 7px 12px; font-size: 12.5px; }
  .btn.subtle { background: transparent; border-color: var(--line); color: var(--ink); }
  .btn.subtle:hover { background: #f3ebec; }
  .icon-btn {
    background: none; border: none; cursor: pointer; color: var(--muted);
    font-size: 14px; padding: 5px 7px; border-radius: 6px; font-family: inherit;
    transition: background .15s ease, color .15s ease;
  }
  .icon-btn:hover { background: #f3ebec; color: var(--ink); }
  .icon-btn.danger:hover { background: #f6dede; color: var(--danger); }

  /* Cards / stats */
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); padding: 18px 20px; }
  .stat-card .label { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 8px; }
  .stat-card .value { font-size: 26px; font-weight: 700; }
  .stat-card .value.warn { color: var(--warn); }
  .stat-card .value.ok { color: var(--ok); }
  .stat-card .value.danger { color: var(--danger); }

  .panels { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; }
  .panel { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); padding: 22px; }
  .panel h2 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .panel .panel-sub { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  .row-item { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--line); font-size: 13.5px; }
  .row-item:last-child { border-bottom: none; }
  .row-item .name { font-weight: 500; }
  .row-item .meta { color: var(--muted); font-size: 12px; }

  /* Badges */
  .badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; display: inline-block; }
  .badge.neutral   { background: #eee7e8; color: var(--muted); }
  .badge.proposta  { background: #eee7e8; color: var(--muted); }
  .badge.andamento { background: #e4ecf0; color: var(--blue); }
  .badge.negociacao{ background: #fbe9d9; color: var(--warn); }
  .badge.novo      { background: #e4ecf0; color: var(--blue); }
  .badge.pausado   { background: #fbe9d9; color: var(--warn); }
  .badge.pendente  { background: #fbe9d9; color: var(--warn); }
  .badge.atrasado  { background: #f6dede; color: var(--danger); }
  .badge.perdido   { background: #f6dede; color: var(--danger); }
  .badge.pago      { background: #e2ede5; color: var(--ok); }
  .badge.concluido { background: #e2ede5; color: var(--ok); }
  .badge.ganho     { background: #e2ede5; color: var(--ok); }
  .badge.receita   { background: #e2ede5; color: var(--ok); }
  .badge.despesa   { background: #f6dede; color: var(--danger); }

  /* Tables */
  .card { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
  .table-wrap { width: 100%; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  thead th {
    text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--muted); padding: 14px 18px; border-bottom: 1px solid var(--line); background: #fbf8f6; white-space: nowrap;
  }
  tbody td { padding: 14px 18px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #fdfbfa; }
  td.strong { font-weight: 600; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  th.num { text-align: right; }
  td.actions { text-align: right; white-space: nowrap; }
  .sub { color: var(--muted); font-size: 12px; }

  .empty { color: var(--muted); font-size: 13.5px; padding: 44px 24px; text-align: center; }
  .empty strong { display: block; color: var(--ink); font-weight: 600; margin-bottom: 6px; font-size: 15px; }

  /* Filter bar */
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .toolbar input[type=search], .toolbar select {
    font-family: inherit; font-size: 13px; padding: 9px 12px;
    border: 1px solid var(--line); border-radius: var(--radius); background: #fff; color: var(--ink);
  }
  .toolbar input[type=search] { min-width: 220px; }
  .toolbar .spacer { flex: 1; }

  /* Modal */
  .overlay {
    position: fixed; inset: 0; background: rgba(33,16,19,.42);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 48px 20px; z-index: 50; overflow-y: auto;
  }
  .modal { background: #fff; border-radius: 14px; width: 100%; max-width: 560px; box-shadow: var(--shadow); animation: pop .16s ease; }
  @keyframes pop { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .modal-head { display: flex; justify-content: space-between; align-items: center; padding: 22px 26px; border-bottom: 1px solid var(--line); }
  .modal-head h3 { font-size: 17px; font-weight: 700; }
  .modal-body { padding: 22px 26px; }
  .modal-foot { display: flex; justify-content: flex-end; gap: 10px; padding: 18px 26px; border-top: 1px solid var(--line); }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12.5px; font-weight: 600; margin-bottom: 6px; color: var(--ink); }
  .field input, .field select, .field textarea {
    width: 100%; font-family: inherit; font-size: 14px; color: var(--ink);
    padding: 10px 12px; border: 1px solid var(--line); border-radius: var(--radius); background: #fff;
  }
  .field textarea { resize: vertical; min-height: 72px; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--bordeaux); box-shadow: 0 0 0 3px rgba(86,22,36,.1); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .etapas-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px 14px; }
  .chk { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 400; cursor: pointer; }
  .chk input { width: 15px; height: 15px; accent-color: var(--bordeaux); }

  /* Pagamentos / parcelas */
  .pay-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 18px; }
  .pay-summary > div { background: #fbf8f6; border: 1px solid var(--line); border-radius: var(--radius); padding: 12px 14px; }
  .pay-summary .k { font-size: 11px; text-transform: uppercase; letter-spacing: .03em; color: var(--muted); font-weight: 600; margin-bottom: 4px; }
  .pay-summary .v { font-size: 18px; font-weight: 700; }
  .pay-summary .v.ok { color: var(--ok); } .pay-summary .v.warn { color: var(--warn); }
  .pay-list { display: flex; flex-direction: column; margin-bottom: 18px; }
  .pay-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--line); }
  .pay-row:last-child { border-bottom: none; }
  .pay-row input { font-family: inherit; font-size: 12.5px; padding: 7px 8px; border: 1px solid var(--line); border-radius: 8px; color: var(--ink); }
  .pay-desc { flex: 1 1 150px; } .pay-venc { flex: 0 0 140px; } .pay-val { flex: 0 0 96px; }
  .pay-gen { border-top: 1px solid var(--line); padding-top: 16px; }
  .pay-gen-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; }

  /* Quadro de conteúdo (Kanban) */
  .kanban { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; align-items: start; }
  .kb-col { background: #fbf8f6; border: 1px solid var(--line); border-radius: var(--radius); padding: 12px; min-height: 160px; transition: background .12s ease, border-color .12s ease; }
  .kb-col.drag-over { background: #f1e6e8; border-color: var(--bordeaux); }
  .kb-col h3 { font-size: 11.5px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); font-weight: 700; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .kb-col h3 span { background: #eee7e8; color: var(--bordeaux); border-radius: 20px; padding: 1px 8px; font-size: 11px; }
  .kb-add { width: 100%; font-family: inherit; font-size: 12.5px; padding: 9px 10px; border: 1px dashed var(--line); border-radius: 8px; background: #fff; margin-bottom: 10px; }
  .kb-add:focus { outline: none; border-color: var(--bordeaux); border-style: solid; }
  .kb-card { background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; cursor: grab; box-shadow: 0 1px 2px rgba(33,16,19,.05); transition: box-shadow .12s ease, transform .12s ease; }
  .kb-card:hover { box-shadow: 0 6px 16px -8px rgba(86,22,36,.35); transform: translateY(-1px); }
  .kb-card.dragging { opacity: .4; }
  .kb-card .t { font-weight: 600; font-size: 13.5px; line-height: 1.25; margin-bottom: 8px; }
  .kb-card .meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; font-size: 11px; color: var(--muted); }
  .kb-chip { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; padding: 2px 7px; border-radius: 20px; background: #f3ebec; color: var(--bordeaux); }
  @media (max-width: 900px) { .kanban { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .kanban { grid-template-columns: 1fr; } }
  /* Legenda de formatos (cores) */
  .fmt-legend { display: flex; flex-wrap: wrap; gap: 8px 16px; margin: 0 0 16px; font-size: 12px; color: var(--muted); }
  .fmt-item { display: flex; align-items: center; gap: 6px; }
  .fmt-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .fmt-legend strong { font-weight: 700; }
  .leg-sep { width: 1px; height: 13px; background: var(--line); display: inline-block; margin: 0 2px; }
  .detail-lbl { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); font-weight: 600; margin-bottom: 6px; }
  .detail-notes { white-space: pre-wrap; word-break: break-word; font-size: 14px; line-height: 1.5; background: #fbf8f6; border: 1px solid var(--line); border-radius: 8px; padding: 12px 14px; max-height: 46vh; overflow: auto; }

  /* Lembretes */
  .lembrete .l-txt { font-size: 14px; }
  .lembrete.feito .l-txt { text-decoration: line-through; color: var(--muted); }
  .lembrete input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--bordeaux); }

  /* Calendar */
  .cal { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
  .cal-head { display: grid; grid-template-columns: repeat(7,1fr); background: #fbf8f6; border-bottom: 1px solid var(--line); }
  .cal-head div { padding: 10px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); text-align: center; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); }
  .cal-cell { min-height: 104px; min-width: 0; overflow: hidden; border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 8px; cursor: pointer; position: relative; transition: background .12s ease; }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell:hover { background: #fdfbfa; }
  .cal-cell.other { background: #faf7f6; color: var(--muted); cursor: default; }
  .cal-cell.other:hover { background: #faf7f6; }
  .cal-cell .day-num { font-size: 12.5px; font-weight: 600; margin-bottom: 5px; }
  .cal-cell.today .day-num { background: var(--bordeaux); color: #fff; width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; }
  .evt-pill { display: block; max-width: 100%; font-size: 11px; padding: 3px 7px; border-radius: 5px; margin-bottom: 3px; background: #f1e6e8; color: var(--bordeaux); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
  .evt-pill .t { opacity: .7; margin-right: 4px; }
  .cal-more { font-size: 10.5px; color: var(--muted); font-weight: 600; }
  .evt-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
  .drive-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
  .drive-dot.on { background: var(--ok); }
  .drive-dot.off { background: #d6cacc; }

  /* Precificação */
  .pr-wrap { display: grid; grid-template-columns: minmax(0,1fr) 340px; gap: 22px; align-items: start; }
  .pr-main { min-width: 0; }
  .pr-sec { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 16px; }
  .pr-sec h3 { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
  .pr-row, .pr-item { display: grid; gap: 8px; align-items: center; margin-bottom: 6px; }
  .pr-row { grid-template-columns: minmax(0,1fr) 110px 62px 100px 24px; }
  .pr-item { grid-template-columns: minmax(0,1fr) 80px 100px 24px; }
  .pr-row.head, .pr-item.head { font-size: 10.5px; text-transform: uppercase; letter-spacing: .03em; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
  .pr-row input, .pr-item input { width: 100%; font-family: inherit; font-size: 13px; padding: 8px 9px; border: 1px solid var(--line); border-radius: 8px; color: var(--ink); }
  .pr-row input:disabled, .pr-item input:disabled { background: #f7f2f0; color: var(--ink); font-weight: 600; }
  .pr-total { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; font-size: 13px; }
  .pr-x { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; }
  .pr-x:hover { color: var(--danger); }
  .pr-add { background: none; border: none; color: var(--bordeaux); cursor: pointer; font-weight: 600; font-size: 12.5px; padding: 6px 0; }
  .pr-sub { text-align: right; font-weight: 700; font-size: 13.5px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--line); }
  .et-group { margin-bottom: 16px; }
  .et-title { font-weight: 700; font-size: 13px; margin: 6px 0 10px; color: var(--bordeaux); }
  .pr-config { display: flex; flex-wrap: wrap; gap: 14px; }
  .pr-config .field { margin: 0; flex: 1 1 120px; }
  .pr-config .field input { width: 100%; font-family: inherit; font-size: 14px; padding: 9px 11px; border: 1px solid var(--line); border-radius: var(--radius); }
  .pr-config .field input:disabled { background: #f7f2f0; font-weight: 700; color: var(--bordeaux); }
  .pr-summary { background: #fbf8f6; border: 1px solid var(--line); border-radius: var(--radius); padding: 20px; position: sticky; top: 20px; }
  .pr-line { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
  .pr-line:last-of-type { border-bottom: none; }
  .pr-line .v { font-variant-numeric: tabular-nums; font-weight: 600; }
  .pr-line.big { font-size: 19px; font-weight: 800; color: var(--bordeaux); border-top: 2px solid var(--bordeaux); margin-top: 4px; padding-top: 12px; }
  .pr-line.big .v { font-weight: 800; }
  @media (max-width: 1080px) { .pr-wrap { grid-template-columns: 1fr; } .pr-summary { position: static; } }
  @media (max-width: 720px) {
    .pr-sec { padding: 14px; }
    .pr-row, .pr-item { display: flex; flex-wrap: wrap; gap: 6px 8px; }
    .pr-row.head, .pr-item.head { display: none; }
    .pr-row [data-k=desc], .pr-item [data-k=nome] { flex: 1 1 100%; }
    .pr-row [data-k=valor] { flex: 2 1 90px; }
    .pr-row [data-k=qtd], .pr-item [data-k=horas] { flex: 1 1 60px; }
    .pr-total { flex: 1 1 auto; }
    .pr-x { flex: 0 0 auto; }
  }
  .evt-pill[draggable="true"] { cursor: grab; }
  .evt-pill.dragging { opacity: .4; }
  .cal-cell.drag-over, .wk-col.drag-over { outline: 2px solid var(--bordeaux); outline-offset: -2px; background: #f1e6e8; }

  /* Calendário estilo Fantastical: calendário + agenda lateral */
  .cal-layout { display: grid; grid-template-columns: minmax(0,1fr) 320px; gap: 20px; align-items: start; }
  .cal-main { min-width: 0; }
  .cal-title { margin-bottom: 14px; font-size: 17px; font-weight: 700; text-transform: capitalize; }
  .cal-agenda { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); padding: 18px 20px; max-height: 74vh; overflow-y: auto; position: sticky; top: 20px; }
  .cal-agenda h3 { font-size: 11.5px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 16px; }
  .ag-day { display: flex; gap: 14px; padding-bottom: 14px; margin-bottom: 14px; border-bottom: 1px solid var(--line); }
  .ag-day:last-child { border-bottom: none; margin-bottom: 0; }
  .ag-date { flex: 0 0 44px; text-align: center; }

<script>
/* ============================================================
   Estúdio Gecê — Painel Admin (SPA, localStorage)
   ============================================================ */

/* ---------- Helpers ---------- */
const $ = (s, r=document) => r.querySelector(s);
const uid = () => (crypto.randomUUID ? crypto.randomUUID() : 'id-' + Date.now() + Math.random().toString(16).slice(2));
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const BRL = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
const fmtMoney = v => BRL.format(Number(v) || 0);
let hideValues = localStorage.getItem('gece_hide_values') === '1';
const maskMoney = v => hideValues ? 'R$ ••••••' : fmtMoney(v);
const todayISO = () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().slice(0,10); };
const fmtDate = iso => iso ? new Date(iso + 'T00:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' }) : '—';
const fmtDateFull = iso => iso ? new Date(iso + 'T00:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' }) : '—';

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ---------- Labels ---------- */
const T = {
  tipologia:   { residencial:'Residencial', comercial:'Comercial', comercial_especial:'Comercial especial', interiores:'Interiores', paisagistico:'Paisagístico', urbanistico:'Urbanístico', regularizacao:'Regularização', reforma:'Reforma', retrofit:'Retrofit', institucional:'Institucional', consultoria:'Consultoria' },
  projStatus:  { proposta:'Proposta', andamento:'Em andamento', pausado:'Pausado', concluido:'Concluído' },
  fase:        { levantamento:'Levantamento cadastral', estudo:'Estudo preliminar', anteprojeto:'Anteprojeto', basico:'Projeto básico', legal:'Projeto legal', executivo:'Projeto executivo', obra:'Acompanhamento / obra', entregue:'Entrega final' },
  finTipo:     { receita:'Receita', despesa:'Despesa' },
  finStatus:   { pendente:'Pendente', pago:'Pago', atrasado:'Atrasado' },
  leadStatus:  { novo:'Novo', negociacao:'Em negociação', ganho:'Ganho', perdido:'Perdido' },
  evtTipo:     { reuniao:'Reunião', visita:'Visita técnica', entrega:'Entrega', obra:'Obra', outro:'Outro' },
  canal:       { instagram:'Instagram', facebook:'Facebook', tiktok:'TikTok', linkedin:'LinkedIn', youtube:'YouTube', site:'Site / Blog', googleads:'Google Ads', outro:'Outro' },
  formato:     { story:'Story', carrossel:'Carrossel', reels:'Reels', post:'Post / Feed', tiktok:'TikTok', video:'Vídeo' },
  postStatus:  { ideia:'Ideia', producao:'Em produção', agendado:'Agendado', publicado:'Publicado' },
  campStatus:  { planejada:'Planejada', ativa:'Ativa', concluida:'Concluída' },
};
const options = (map, sel) => Object.entries(map).map(([v,l]) => `<option value="${v}"${v===sel?' selected':''}>${l}</option>`).join('');
const badge = (cls, label) => `<span class="badge ${cls}">${label}</span>`;
const FORMATO_COR = { story:'#e1306c', carrossel:'#3d6b8a', reels:'#833ab4', post:'#3f6b4f', tiktok:'#111111', video:'#c0392b', outro:'#8a7a7d' };
const postColor = p => FORMATO_COR[p && p.formato] || '#8a7a7d';
const ETAPAS_ALL = ['levantamento','estudo','anteprojeto','basico','legal','executivo','obra','entregue'];
const parseEtapas = v => { try { const a = JSON.parse(v); return Array.isArray(a) && a.length ? a : ETAPAS_ALL.slice(); } catch { return ETAPAS_ALL.slice(); } };

/* ---------- API (Cloudflare Worker + D1) ---------- */
async function api(method, path, body) {
  const res = await fetch('/api' + path, {
    method,
    headers: body ? { 'content-type': 'application/json' } : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 401) { location.href = '/login'; throw new Error('unauth'); }
  const data = await res.json().catch(() => ({}));
  if (!res.ok || data.ok === false) throw new Error(data.error || 'Erro na requisição.');
  return data;
}

/* ---------- Data layer (cache local espelhando o D1) ---------- */
const DB = {
  data: { projetos: [], financeiro: [], eventos: [], leads: [], clientes: [] },
  cols: ['projetos','financeiro','eventos','leads','clientes','posts','campanhas','lembretes'],
  async load() {
    const d = await api('GET', '/admin/data');
    this.cols.forEach(c => { this.data[c] = Array.isArray(d[c]) ? d[c] : []; });
    return this;
  },
  all(c) { return this.data[c] || []; },
  get(c, id) { return (this.data[c] || []).find(x => x.id === id); },
  async upsert(c, rec) {
    if (rec.id) await api('PUT', `/admin/${c}/${rec.id}`, rec);
    else await api('POST', `/admin/${c}`, rec);
    await this.load();
    return true;
  },
  async remove(c, id) { await api('DELETE', `/admin/${c}/${id}`); await this.load(); },
};

/* Effective financeiro status: pendente + vencido => atrasado */
const effFinStatus = f => (f.status === 'pendente' && f.vencimento && f.vencimento < todayISO()) ? 'atrasado' : f.status;
const projName = id => { const p = DB.get('projetos', id); return p ? p.nome : '—'; };
const linkHost = u => { try { return new URL(u).hostname.replace(/^www\./,''); } catch { return u; } };

/* ---------- Google Drive Picker ----------
   Preencha apiKey e clientId (obtidos no Google Cloud Console) para ligar o
   botão "Escolher no Google Drive". Vazio = botão fica oculto (só link manual). */
const GDRIVE = {
  apiKey: 'AIzaSyDBUVl1FJ1ksFJsR766cjooYbMNpYF5HRQ',  // API key (Google Picker API)
  clientId: '893374859773-8k5v800igkl51c6qr948st78h0ls5ngp.apps.googleusercontent.com',
  scope: 'https://www.googleapis.com/auth/drive.readonly',
  token: null, tokenClient: null, pickerReady: false, onPick: null,
  enabled() { return !!(this.apiKey && this.clientId); },
  ready() { return !!(window.google && google.accounts && google.accounts.oauth2 && window.gapi); },
  choose(onPick) {
    if (!this.enabled()) return;
    this.onPick = onPick;
    if (!this.ready()) { toast('Google Drive ainda carregando — tente de novo em 1s.'); return; }
    if (!this.tokenClient) {
      this.tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: this.clientId, scope: this.scope,
        callback: (r) => { if (r && r.access_token) { this.token = r.access_token; this.show(); } },
      });
    }
    if (this.token) this.show();
    else this.tokenClient.requestAccessToken({ prompt: '' });
  },
  show() {
    if (!this.pickerReady) { gapi.load('picker', () => { this.pickerReady = true; this.show(); }); return; }
    const files = new google.picker.DocsView().setIncludeFolders(true).setSelectFolderEnabled(true);
    const folders = new google.picker.DocsView(google.picker.ViewId.FOLDERS).setSelectFolderEnabled(true);
    const picker = new google.picker.PickerBuilder()
      .setDeveloperKey(this.apiKey)
      .setOAuthToken(this.token)
      .addView(files)
      .addView(folders)
      .setCallback((data) => {
        if (data.action === google.picker.Action.PICKED && data.docs && data.docs[0]) {
          const d = data.docs[0];
          this.onPick && this.onPick(d.name, d.url || `https://drive.google.com/open?id=${d.id}`);
        }
      })
      .build();
    picker.setVisible(true);
  },
};

/* ---------- Google Calendar / Meet (reusa o clientId do Picker) ---------- */
const GCAL = {
  scope: 'https://www.googleapis.com/auth/calendar.events',
  token: null, tokenClient: null, _res: null, _rej: null,
  enabled() { return !!GDRIVE.clientId; },
  ready() { return !!(window.google && google.accounts && google.accounts.oauth2); },
  getToken() {
    return new Promise((resolve, reject) => {
      if (!this.ready()) return reject(new Error('Google ainda carregando.'));
      if (!this.tokenClient) {
        this.tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: GDRIVE.clientId, scope: this.scope,
          callback: (r) => { if (r && r.access_token) { this.token = r.access_token; this._res && this._res(r.access_token); } else { this._rej && this._rej(new Error('Autorização negada.')); } },
        });
      }
      this._res = resolve; this._rej = reject;
      if (this.token) resolve(this.token);
      else this.tokenClient.requestAccessToken({ prompt: '' });
    });
  },
  async criarReuniao({ titulo, descricao, data, hora, emailCliente }) {
    const token = await this.getToken();
    const ini = hora || '09:00';
    const [H, M] = ini.split(':').map(Number);
    const fim = `${String((H + 1) % 24).padStart(2,'0')}:${String(M||0).padStart(2,'0')}`;
    const body = {
      summary: titulo,
      description: descricao || '',
      start: { dateTime: `${data}T${ini}:00`, timeZone: 'America/Maceio' },
      end: { dateTime: `${data}T${fim}:00`, timeZone: 'America/Maceio' },
      conferenceData: { createRequest: { requestId: 'gece-' + Date.now(), conferenceSolutionKey: { type: 'hangoutsMeet' } } },
    };
    if (emailCliente) body.attendees = [{ email: emailCliente }];
    const url = 'https://www.googleapis.com/calendar/v3/calendars/primary/events?conferenceDataVersion=1' + (emailCliente ? '&sendUpdates=all' : '');
    const res = await fetch(url, { method: 'POST', headers: { Authorization: 'Bearer ' + token, 'content-type': 'application/json' }, body: JSON.stringify(body) });
    const d = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error((d.error && d.error.message) || 'Falha no Google Calendar.');
    const meet = d.hangoutLink || (d.conferenceData && d.conferenceData.entryPoints && d.conferenceData.entryPoints.find(e => e.entryPointType === 'video')?.uri) || '';
    return { meet, gcalId: d.id || '' };
  },
};
function clientEmailDoProjeto(projetoId) {
  if (!projetoId) return '';
  const p = DB.get('projetos', projetoId);
  if (!p || !p.clientId) return '';
  const c = DB.get('clientes', p.clientId);
  return c ? c.email : '';
}

/* ---------- Modal de pagamentos / parcelas por projeto ---------- */
function openPagamentosModal(projeto) {
  const root = $('#modalRoot');
  const close = () => { root.innerHTML = ''; };
  async function draw() {
    const parcelas = DB.all('financeiro')
      .filter(f => f.projetoId === projeto.id && f.tipo === 'receita')
      .sort((a,b) => (a.vencimento||'').localeCompare(b.vencimento||''));
    const total = parcelas.reduce((s,f)=>s+(Number(f.valor)||0),0);
    const pago = parcelas.filter(f=>f.status==='pago').reduce((s,f)=>s+(Number(f.valor)||0),0);
    const nPagas = parcelas.filter(f=>f.status==='pago').length;
    root.innerHTML = `
      <div class="overlay" id="overlay">
        <div class="modal" style="max-width:660px">
          <div class="modal-head">
            <h3>Pagamentos — ${esc(projeto.nome)}</h3>
            <button type="button" class="icon-btn" id="pClose" aria-label="Fechar">✕</button>
          </div>
          <div class="modal-body">
            <div class="pay-summary">
              <div><div class="k">Parcelas pagas</div><div class="v">${nPagas} de ${parcelas.length}</div></div>
              <div><div class="k">Recebido</div><div class="v ok">${fmtMoney(pago)}</div></div>
              <div><div class="k">Falta</div><div class="v warn">${fmtMoney(total-pago)}</div></div>
            </div>
            ${parcelas.length ? `<div class="pay-list">${parcelas.map(f => { const st = effFinStatus(f); return `
              <div class="pay-row" data-id="${f.id}">
                <input class="pay-desc" value="${esc(f.descricao)}" aria-label="Descrição">
                <input class="pay-venc" type="date" value="${esc(f.vencimento||'')}" aria-label="Vencimento">
                <input class="pay-val" type="number" step="0.01" min="0" value="${f.valor??''}" aria-label="Valor">
                <span class="badge ${st}">${T.finStatus[st]}</span>
                <button class="icon-btn" data-save="${f.id}">Salvar</button>
                <button class="icon-btn" data-toggle="${f.id}">${f.status==='pago'?'Reabrir':'Quitar'}</button>
                <button class="icon-btn danger" data-del="${f.id}">✕</button>
              </div>`; }).join('')}</div>` : `<div class="empty" style="padding:20px 0">Nenhuma parcela cadastrada.</div>`}
            <form id="genForm" class="pay-gen">
              <div class="pay-gen-title">Gerar parcelas</div>
              <div class="field-row">
                <div class="field"><label>Nº de parcelas</label><input name="n" type="number" min="1" max="60" value="10" required></div>
                <div class="field"><label>Valor de cada (R$)</label><input name="valor" type="number" step="0.01" min="0" placeholder="0,00" required></div>
              </div>
              <div class="field-row">
                <div class="field"><label>1º vencimento</label><input name="inicio" type="date" value="${todayISO()}" required></div>
                <div class="field"><label>Descrição</label><input name="base" value="Parcela"></div>
              </div>
              <button type="submit" class="btn sm">Gerar parcelas mensais</button>
            </form>
          </div>
          <div class="modal-foot"><button type="button" class="btn subtle" id="pDone">Fechar</button></div>
        </div>
      </div>`;
    $('#pClose').onclick = close; $('#pDone').onclick = close;
    $('#overlay').onclick = e => { if (e.target.id === 'overlay') close(); };
    root.querySelectorAll('[data-save]').forEach(b => b.onclick = async () => {
      const row = b.closest('.pay-row'); const f = DB.get('financeiro', b.dataset.save);
      try {
        await DB.upsert('financeiro', { ...f, descricao: row.querySelector('.pay-desc').value, vencimento: row.querySelector('.pay-venc').value, valor: row.querySelector('.pay-val').value });
        await draw(); toast('Parcela atualizada.');
      } catch (e) { toast(e.message || 'Erro.'); }
    });
    root.querySelectorAll('[data-toggle]').forEach(b => b.onclick = async () => {
      const f = DB.get('financeiro', b.dataset.toggle);
      await DB.upsert('financeiro', { ...f, status: f.status === 'pago' ? 'pendente' : 'pago' });
      await draw(); toast(f.status === 'pago' ? 'Parcela reaberta.' : 'Parcela quitada.');
    });
    root.querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
      if (!confirm('Remover esta parcela?')) return;
      await DB.remove('financeiro', b.dataset.del); await draw(); toast('Parcela removida.');
    });
    $('#genForm').onsubmit = async e => {
      e.preventDefault();
      const fd = Object.fromEntries(new FormData(e.target).entries());
      const n = Math.min(60, Math.max(1, parseInt(fd.n) || 1));
      const base = fd.base || 'Parcela';
      const btn = e.target.querySelector('button[type=submit]'); btn.disabled = true; btn.textContent = 'Gerando…';
      try {
        for (let i = 0; i < n; i++) {
          await api('POST', '/admin/financeiro', { descricao: `${base} ${i+1}/${n}`, tipo: 'receita', valor: fd.valor, vencimento: shiftMonths(fd.inicio, i), status: 'pendente', projetoId: projeto.id });
        }
        await DB.load(); await draw(); toast(`${n} parcelas geradas.`);
      } catch (err) { toast(err.message || 'Erro ao gerar.'); btn.disabled = false; btn.textContent = 'Gerar parcelas mensais'; }
    };
  }
  draw();
}

/* ---------- Modal de arquivos (links do Google Drive por projeto) ---------- */
function openFilesModal(projeto) {
  const root = $('#modalRoot');
  const close = () => { root.innerHTML = ''; };
  async function draw() {
    const p = DB.get('projetos', projeto.id) || projeto;
    const files = p.arquivos || [];
    root.innerHTML = `
      <div class="overlay" id="overlay">
        <div class="modal" style="max-width:600px">
          <div class="modal-head">
            <h3>Arquivos — ${esc(p.nome)}</h3>
            <button type="button" class="icon-btn" id="fClose" aria-label="Fechar">✕</button>
          </div>
          <div class="modal-body">
            ${files.length ? files.map(f => `
              <div class="row-item">
                <div><div class="name">${esc(f.nome)}</div><div class="meta">${esc(linkHost(f.url))}</div></div>
                <div style="display:flex;gap:4px;align-items:center">
                  <a class="icon-btn" href="${esc(f.url)}" target="_blank" rel="noopener">Abrir</a>
                  <button class="icon-btn danger" data-delfile="${f.id}" data-name="${esc(f.nome)}">Excluir</button>
                </div>
              </div>`).join('') : `<div class="empty" style="padding:24px 0">Nenhum arquivo vinculado ainda.</div>`}
            <form id="linkForm" style="margin-top:16px;padding-top:16px;border-top:1px solid var(--line)">
              ${GDRIVE.enabled() ? `<button type="button" class="btn ghost sm" id="pickDrive" style="margin-bottom:14px">📁 Escolher no Google Drive</button>` : ''}
              <div class="field" style="margin-bottom:12px"><label>Nome do arquivo</label><input name="nome" required placeholder="Ex.: Projeto executivo (PDF)"></div>
              <div class="field" style="margin-bottom:12px"><label>Link do Google Drive</label><input name="url" type="url" required placeholder="https://drive.google.com/…"></div>
              <button type="submit" class="btn sm">+ Vincular arquivo</button>
              <span class="sub" style="margin-left:10px">${GDRIVE.enabled() ? 'Escolha no Drive ou cole o link.' : 'Cole o link de compartilhamento do Drive.'}</span>
            </form>
          </div>
          <div class="modal-foot"><button type="button" class="btn subtle" id="fDone">Fechar</button></div>
        </div>
      </div>`;
    $('#fClose').onclick = close;

    $('#overlay').onclick = e => { if (e.target.id === 'overlay') close(); };
    const pick = $('#pickDrive');

      const f = $('#linkForm');
      f.querySelector('[name=nome]').value = nome;
      f.querySelector('[name=url]').value = url;
    });
    $('#linkForm').onsubmit = async e => {
      e.preventDefault();
      const fd = Object.fromEntries(new FormData(e.target).entries());
      const btn = e.target.querySelector('button[type=submit]'); btn.disabled = true;
      try {
        await DB.upsert('arquivos', { nome: fd.nome, url: fd.url, projetoId: projeto.id });
        await draw(); toast('Arquivo vinculado.');
      } catch (err) { toast(err.message || 'Erro ao vincular.'); btn.disabled = false; }
    };
    root.querySelectorAll('[data-delfile]').forEach(b => b.onclick = async () => {
      if (!confirm(`Remover o link "${b.dataset.name}"?`)) return;
      try { await DB.remove('arquivos', b.dataset.delfile); await draw(); toast('Arquivo removido.'); }
      catch (err) { toast(err.message || 'Erro ao remover.'); }
    });
  }
  draw();
}

/* ---------- Modal ---------- */
function openModal(title, bodyHTML, onSubmit, submitLabel = 'Salvar') {
  const root = $('#modalRoot');
  root.innerHTML = `
    <div class="overlay" id="overlay">
      <form class="modal" id="modalForm" autocomplete="off">
        <div class="modal-head">
          <h3>${esc(title)}</h3>
          <button type="button" class="icon-btn" id="modalClose" aria-label="Fechar">✕</button>
        </div>
        <div class="modal-body">${bodyHTML}</div>
        <div class="modal-foot">
          <button type="button" class="btn subtle" id="modalCancel">Cancelar</button>
          <button type="submit" class="btn">${esc(submitLabel)}</button>
        </div>
      </form>
    </div>`;
  const close = () => { root.innerHTML = ''; };
  $('#modalClose').onclick = close;
  $('#modalCancel').onclick = close;
  $('#overlay').onclick = e => { if (e.target.id === 'overlay') close(); };
  document.addEventListener('keydown', function esc2(e){ if(e.key==='Escape'){ close(); document.removeEventListener('keydown', esc2);} });
  $('#modalForm').onsubmit = async e => {
    e.preventDefault();
    const submitBtn = e.target.querySelector('.btn[type=submit]');
    const fd = Object.fromEntries(new FormData(e.target).entries());
    if (submitBtn) { submitBtn.disabled = true; }
    try {
      const r = await onSubmit(fd);
      if (r !== false) close();
    } catch (err) {
      toast(err.message || 'Erro ao salvar.');
    } finally {
      if (submitBtn) submitBtn.disabled = false;
    }
  };
  const first = root.querySelector('input,select,textarea');
  if (first) first.focus();
}

function confirmDelete(label, onYes) {
  openModal('Remover', `<p style="font-size:14px;color:var(--ink)">Tem certeza que deseja remover <strong>${esc(label)}</strong>? Esta ação não pode ser desfeita.</p>`,
    async () => { await onYes(); return true; }, 'Remover');
  // recolor submit as danger
  const btn = $('#modalForm .btn[type=submit]');
  if (btn) { btn.style.background = 'var(--danger)'; btn.style.borderColor = 'var(--danger)'; }
}

let precoModel = null;
function precoDefault() {
  const fx = ['Aluguel','Condomínio','Energia','Água','Internet','Telefone','Software','Assinaturas','Contabilidade','Taxas (TLF)','Folha de pagamento','Pró-labore','Marketing','Dívidas / empréstimo','Conselho de arquitetura','Taxa de limpeza','Manutenção de máquina','Outros'].map(d => ({ desc: d, valor: '', qtd: '1' }));
  const vr = ['Transporte','Impressões e plotagens','Renderização','Papelaria','Brinde','Kit vizinhos','Registro fotográfico','Material para redes sociais','Consultoria de engenharia','Assessoria em regularização','RRT'].map(d => ({ desc: d, valor: '', qtd: '1' }));
  const et = [
    ['Estudo Preliminar', ['Levantamento cadastral','Programa de necessidades','Estudo de viabilidade','Croquis iniciais']],
    ['Anteprojeto', ['Planta baixa','Layout preliminar','Estudo 3D inicial']],
    ['Projeto Básico', ['Plantas de layout','Cortes e fachadas','Planta de localização']],
    ['Projeto Legal', ['Planta de situação','Quadros gerais de áreas','Memorial descritivo']],
    ['Projeto Executivo', ['Planta baixa de construir e demolir','Planta baixa de layout','Planta baixa de layout elétrico','Planta baixa de layout luminotécnico','Planta baixa de layout hidrossanitário','Paginação de revestimentos e pintura','Detalhamento de marcenaria','Detalhamento de serralheria','Detalhamento de esquadrias','Especificação técnica de materiais','Estudo volumétrico 3D finalizado']],
  ].map(([nome, itens]) => ({ nome, itens: itens.map(n => ({ nome: n, horas: '' })) }));
  return { fixos: fx, variaveis: vr, etapas: et, horasSemana: '40', semanas: '4', margemPct: '20', comissaoPct: '10', comissaoAplica: false, impostoPct: '15.5', naoRepassado: '' };
}
function precoNormaliza(m) {
  const d = precoDefault();
  m = Object.assign({}, d, m || {});
  if (!Array.isArray(m.fixos) || !m.fixos.length) m.fixos = d.fixos;
  if (!Array.isArray(m.variaveis) || !m.variaveis.length) m.variaveis = d.variaveis;
  if (!Array.isArray(m.etapas) || !m.etapas.length) m.etapas = d.etapas;
  return m;
}

function precoReadModel() {
  const rows = s => [...document.querySelectorAll(s)];
  const g = (r, k) => r.querySelector(`[data-k=${k}]`).value;
  precoModel.fixos = rows('#fx-rows .pr-row').map(r => ({ desc: g(r,'desc'), valor: g(r,'valor'), qtd: g(r,'qtd') }));
  precoModel.variaveis = rows('#var-rows .pr-row').map(r => ({ desc: g(r,'desc'), valor: g(r,'valor'), qtd: g(r,'qtd') }));
  precoModel.etapas = rows('#etapas .et-group').map(gr => ({ nome: gr.dataset.nome, itens: [...gr.querySelectorAll('.et-item')].map(it => ({ nome: g(it,'nome'), horas: g(it,'horas') })) }));
  precoModel.horasSemana = $('#horasSemana').value; precoModel.semanas = $('#semanas').value;
  precoModel.margemPct = $('#margemPct').value; precoModel.comissaoPct = $('#comissaoPct').value; precoModel.impostoPct = $('#impostoPct').value;
  precoModel.naoRepassado = $('#naoRepassado').value; precoModel.comissaoAplica = $('#comissaoAplica').checked;
}
function precoRecalc() {
  const n = (v, d=0) => { const x = parseFloat(String(v==null?'':v).replace(',','.')); return isFinite(x) ? x : d; };
  let custoFixo = 0;
  document.querySelectorAll('#fx-rows .pr-row').forEach(r => {
    const t = n(r.querySelector('[data-k=valor]').value) * n(r.querySelector('[data-k=qtd]').value, 1);
    r.querySelector('.pr-total').textContent = fmtMoney(t); custoFixo += t;
  });
  $('#s-custoFixo').textContent = fmtMoney(custoFixo);
  const capacidade = n($('#horasSemana').value) * n($('#semanas').value);
  const valorHora = capacidade > 0 ? custoFixo / capacidade : 0;
  $('#s-capacidade').value = capacidade ? capacidade.toLocaleString('pt-BR') : '0';
  $('#s-valorHora').value = fmtMoney(valorHora);
  let custoHoras = 0, totalHoras = 0;
  document.querySelectorAll('#etapas .et-group').forEach(gr => {
    let sub = 0;
    gr.querySelectorAll('.et-item').forEach(it => {
      const h = n(it.querySelector('[data-k=horas]').value); const c = h * valorHora;
      it.querySelector('.pr-total').textContent = fmtMoney(c); sub += c; totalHoras += h;
    });
    gr.querySelector('.et-sub').textContent = fmtMoney(sub); custoHoras += sub;
  });
  $('#s-custoHoras').textContent = fmtMoney(custoHoras);
  $('#s-totalHoras').textContent = totalHoras ? ('· ' + totalHoras.toLocaleString('pt-BR') + ' h') : '';
  let custoVar = 0;
  document.querySelectorAll('#var-rows .pr-row').forEach(r => {
    const t = n(r.querySelector('[data-k=valor]').value) * n(r.querySelector('[data-k=qtd]').value, 1);
    r.querySelector('.pr-total').textContent = fmtMoney(t); custoVar += t;
  });
  $('#s-custoVar').textContent = fmtMoney(custoVar);
  const custoTotal = custoHoras + custoVar;
  const margem = custoTotal * n($('#margemPct').value) / 100;
  const comissao = $('#comissaoAplica').checked ? custoTotal * n($('#comissaoPct').value) / 100 : 0;
  const imposto = (custoTotal + margem + comissao) * n($('#impostoPct').value) / 100;
  const precoFinal = custoTotal + margem + comissao + imposto;
  const lucro = margem - n($('#naoRepassado').value);
  $('#s-custoTotal').textContent = fmtMoney(custoTotal);
  $('#s-margem').textContent = fmtMoney(margem);
  $('#s-comissao').textContent = fmtMoney(comissao);
  $('#s-imposto').textContent = fmtMoney(imposto);
  $('#s-precoFinal').textContent = fmtMoney(precoFinal);
  $('#s-lucro').textContent = fmtMoney(lucro);
}
async function precoSave() {
  precoReadModel();
  try { await api('PUT', '/admin/config/precificacao', { valor: JSON.stringify(precoModel) }); toast('Precificação salva.'); }
  catch (e) { toast(e.message || 'Erro ao salvar.'); }
}
async function renderPrecificacao() {
  view().innerHTML = '<div class="empty" style="padding:40px">Carregando…</div>';
  if (!precoModel) {
    try { const r = await api('GET', '/admin/config/precificacao'); precoModel = precoNormaliza(r.valor ? JSON.parse(r.valor) : null); }
    catch { precoModel = precoDefault(); }
  }
  view().innerHTML = precoHTML();
  const sv = $('#salvarPreco'); if (sv) sv.onclick = precoSave;
  const v = view();
  v.oninput = precoRecalc; v.onchange = precoRecalc;
  v.onclick = e => {
    const x = e.target.closest('.pr-x');
    if (x) {
      precoReadModel();
      const row = x.closest('.et-item, .pr-row');
      if (row.classList.contains('et-item')) {
        const grp = row.closest('.et-group'); const idx = [...grp.querySelectorAll('.et-item')].indexOf(row);
        const et = precoModel.etapas.find(e2 => e2.nome === grp.dataset.nome); if (et) et.itens.splice(idx, 1);
      } else {
        const idx = [...row.parentElement.querySelectorAll('.pr-row')].indexOf(row);
        precoModel[row.dataset.group].splice(idx, 1);
      }
      renderPrecificacao(); return;
    }
    if (e.target.closest('[data-add-fixo]')) { precoReadModel(); precoModel.fixos.push({ desc:'', valor:'', qtd:'1' }); renderPrecificacao(); return; }
    if (e.target.closest('[data-add-var]')) { precoReadModel(); precoModel.variaveis.push({ desc:'', valor:'', qtd:'1' }); renderPrecificacao(); return; }
    const ai = e.target.closest('[data-add-item]');
    if (ai) { precoReadModel(); const et = precoModel.etapas.find(e2 => e2.nome === ai.dataset.addItem); if (et) et.itens.push({ nome:'', horas:'' }); renderPrecificacao(); return; }
  };
  precoRecalc();
}

let calState = { view: 'semana', y: new Date().getFullYear(), m: new Date().getMonth(), anchor: todayISO() };
const isoToDate = iso => new Date(iso + 'T00:00:00');
const dateToISO = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const shiftDays = (iso, n) => { const d = isoToDate(iso); d.setDate(d.getDate()+n); return dateToISO(d); };
const weekStart = iso => { const d = isoToDate(iso); d.setDate(d.getDate()-d.getDay()); return dateToISO(d); };
const shiftMonths = (iso, n) => { const d = isoToDate(iso); d.setMonth(d.getMonth()+n); return dateToISO(d); };

function renderCalendario() {
  $('#pageTitle').textContent = 'Calendário';
  setActions(`
    <div class="seg">
      <button class="seg-btn${calState.view==='semana'?' active':''}" id="calSemana">Semana</button>
      <button class="seg-btn${calState.view==='mes'?' active':''}" id="calMes">Mês</button>
    </div>
    <button class="btn subtle sm" id="calPrev">‹</button>
    <button class="btn subtle sm" id="calToday">Hoje</button>
    <button class="btn subtle sm" id="calNext">›</button>
    <button class="btn" id="novoEvento">+ Novo evento</button>`);

  view().innerHTML = `<div class="cal-layout"><div class="cal-main" id="calMain"></div><aside class="cal-agenda" id="calAgenda"></aside></div>`;

  if (calState.view === 'semana') renderCalWeek(); else renderCalMonth();
  renderAgenda();

  $('#calMes').onclick = () => { calState.view = 'mes'; renderCalendario(); };
  $('#calSemana').onclick = () => { calState.view = 'semana'; renderCalendario(); };
  $('#calToday').onclick = () => { const d = new Date(); calState.y = d.getFullYear(); calState.m = d.getMonth(); calState.anchor = todayISO(); renderCalendario(); };
  $('#novoEvento').onclick = () => eventoForm();
  if (calState.view === 'semana') {
    $('#calPrev').onclick = () => { calState.anchor = shiftDays(weekStart(calState.anchor), -7); renderCalendario(); };
    $('#calNext').onclick = () => { calState.anchor = shiftDays(weekStart(calState.anchor), 7); renderCalendario(); };
  } else {
    $('#calPrev').onclick = () => { calState.m--; if (calState.m < 0){ calState.m = 11; calState.y--; } renderCalendario(); };
    $('#calNext').onclick = () => { calState.m++; if (calState.m > 11){ calState.m = 0; calState.y++; } renderCalendario(); };
  }
}

function renderCalMonth() {
  const { y, m } = calState;
  const monthName = new Date(y, m, 1).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
  const first = new Date(y, m, 1).getDay();
  const days = new Date(y, m + 1, 0).getDate();
  const byDay = {};
  calItems().forEach(it => { (byDay[it.data] = byDay[it.data] || []).push(it); });
  const cells = [];
  for (let i = 0; i < first; i++) cells.push(`<div class="cal-cell other"></div>`);
  for (let d = 1; d <= days; d++) {
    const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evs = (byDay[iso] || []).sort((a,b)=>(a.hora||'').localeCompare(b.hora||''));
    const isToday = iso === todayISO();
    const shown = evs.slice(0, 3).map(calPill).join('');
    const more = evs.length > 3 ? `<div class="cal-more">+${evs.length - 3} mais</div>` : '';
    cells.push(`<div class="cal-cell${isToday?' today':''}" data-day="${iso}"><div class="day-num">${d}</div>${shown}${more}</div>`);
  }
  while (cells.length % 7 !== 0) cells.push(`<div class="cal-cell other"></div>`);
  const main = $('#calMain');
  main.innerHTML = `
    <div class="cal-title">${monthName}</div>
    ${calLegend()}
    <div class="cal">
      <div class="cal-head">${WEEK.map(w => `<div>${w}</div>`).join('')}</div>
      <div class="cal-grid">${cells.join('')}</div>
    </div>`;
  main.querySelectorAll('.cal-cell[data-day]').forEach(c => c.onclick = e => { if (e.target.closest('.evt-pill')) return; eventoForm({ data: c.dataset.day }); });
  wireCalItems(main, renderCalendario);
}

function renderCalWeek() {
  const start = weekStart(calState.anchor);
  const days = Array.from({ length: 7 }, (_, i) => shiftDays(start, i));
  const byDay = {};
  calItems().forEach(it => { (byDay[it.data] = byDay[it.data] || []).push(it); });
  const sd = isoToDate(days[0]), ed = isoToDate(days[6]);
  const label = `${sd.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})} – ${ed.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'})}`;
  const cols = days.map(iso => {
    const d = isoToDate(iso);
    const evs = (byDay[iso] || []).sort((a,b)=>(a.hora||'').localeCompare(b.hora||''));
    const isToday = iso === todayISO();
    return `<div class="wk-col${isToday?' today':''}" data-day="${iso}">
      <div class="wk-head"><span class="wk-dow">${WEEK[d.getDay()]}</span><span class="wk-dnum">${d.getDate()}</span></div>
      <div class="wk-body">${evs.map(calPill).join('')}</div>
    </div>`;
  }).join('');
  const main = $('#calMain');
  main.innerHTML = `<div class="cal-title">${label}</div>${calLegend()}<div class="cal wk-grid">${cols}</div>`;
  main.querySelectorAll('.wk-col[data-day]').forEach(c => c.onclick = e => { if (e.target.closest('.evt-pill')) return; eventoForm({ data: c.dataset.day }); });
  wireCalItems(main, renderCalendario);
}

function renderAgenda() {
  const items = calItems().filter(it => it.data >= todayISO())
    .sort((a,b) => (a.data + (a.hora||'99')).localeCompare(b.data + (b.hora||'99')));
  const byDay = {}, order = [];
  items.forEach(it => { if (!byDay[it.data]) { byDay[it.data] = []; order.push(it.data); } byDay[it.data].push(it); });
  const ag = $('#calAgenda');
  ag.innerHTML = `<h3>Próximos eventos e posts</h3>` + (order.length ? order.slice(0, 30).map(iso => {
    const d = isoToDate(iso);
    return `<div class="ag-day">
      <div class="ag-date${iso===todayISO()?' today':''}">
        <span class="dnum">${d.getDate()}</span>
        <span class="dwd">${WEEK[d.getDay()]} · ${d.toLocaleDateString('pt-BR',{month:'short'})}</span>
      </div>
      <div class="ag-list">${byDay[iso].map(it => `
        <div class="ag-evt" data-id="${it.id}" data-kind="${it.kind}">
          <span class="ag-bar" style="background:${it.color}"></span>
          <div><div class="t">${esc(it.titulo)}</div><div class="m">${it.hora?it.hora+' · ':''}${esc(it.sub)}</div></div>
        </div>`).join('')}</div>
    </div>`;
  }).join('') : `<div class="empty" style="padding:24px 0">Nada à frente.</div>`);
  ag.querySelectorAll('.ag-evt[data-id]').forEach(el => el.onclick = () => calOpen(el.dataset.id, el.dataset.kind));
}

let conteudoView = 'quadro';
let postCal = { y: new Date().getFullYear(), m: new Date().getMonth() };
const POST_COLS = [['ideia','Ideias'],['producao','Em produção'],['agendado','Agendado'],['publicado','Publicado']];
const CANAL_COR = { instagram:'#c13584', facebook:'#1877f2', tiktok:'#111', linkedin:'#0a66c2', youtube:'#ff0000', site:'#561624', googleads:'#188038', outro:'#8a7a7d' };

function renderConteudo() {
  const posts = DB.all('posts');
  view().innerHTML = `
    <div class="toolbar" style="justify-content:space-between">
      <div class="seg">
        <button class="seg-btn${conteudoView==='quadro'?' active':''}" id="cvQuadro">Quadro</button>

function renderKanban(posts) {
  const cols = POST_COLS.map(([s,label]) => {
    const list = posts.filter(p => (p.status||'ideia') === s).sort((a,b)=>(a.data||'').localeCompare(b.data||''));
    return `<div class="kb-col" data-status="${s}">
      <h3>${label}<span>${list.length}</span></h3>
      ${s==='ideia' ? `<input class="kb-add" id="kbAdd" placeholder="+ Nova ideia…">` : ''}
      <div class="kb-cards">${list.map(p => `
        <div class="kb-card" draggable="true" data-id="${p.id}" style="border-left:3px solid ${postColor(p)}">
          <div class="t">${esc(p.titulo)}</div>
          <div class="meta"><span class="kb-chip" style="background:${postColor(p)}1a;color:${postColor(p)}">${T.formato[p.formato]||'—'}</span><span>${T.canal[p.canal]||''}</span>${p.data?`<span>${fmtDate(p.data)}</span>`:''}${(p.status==='publicado'&&p.alcance)?`<span>${Number(p.alcance).toLocaleString('pt-BR')} alcance</span>`:''}</div>
        </div>`).join('')}</div>
    </div>`;
  }).join('');
  $('#conteudoView').innerHTML = `<div class="kanban">${cols}</div>`;

  const add = $('#kbAdd');
  if (add) add.onkeydown = async e => {
    if (e.key === 'Enter' && add.value.trim()) {
      const titulo = add.value.trim(); add.disabled = true;
      try { await DB.upsert('posts', { titulo, status: 'ideia', canal: 'instagram', formato: 'post' }); renderMarketing(); }
      catch (err) { toast(err.message || 'Erro.'); add.disabled = false; }
    }
  };
  $('#conteudoView').querySelectorAll('.kb-card').forEach(c => {
    c.onclick = () => postForm(DB.get('posts', c.dataset.id));
    c.ondragstart = e => { e.dataTransfer.setData('text/plain', c.dataset.id); c.classList.add('dragging'); };
    c.ondragend = () => c.classList.remove('dragging');
  });
  $('#conteudoView').querySelectorAll('.kb-col').forEach(col => {
    col.ondragover = e => { e.preventDefault(); col.classList.add('drag-over'); };
    col.ondragleave = () => col.classList.remove('drag-over');
    col.ondrop = async e => {
      e.preventDefault(); col.classList.remove('drag-over');
      const p = DB.get('posts', e.dataTransfer.getData('text/plain'));
      if (p && p.status !== col.dataset.status) { await DB.upsert('posts', { ...p, status: col.dataset.status }); renderMarketing(); }
    };
  });
}

function renderPostCalendar(posts) {
  const { y, m } = postCal;
  const monthName = new Date(y, m, 1).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
  const first = new Date(y, m, 1).getDay();
  const days = new Date(y, m + 1, 0).getDate();
  const byDay = {};
  posts.forEach(p => { if (p.data) (byDay[p.data] = byDay[p.data] || []).push(p); });
  const cells = [];
  for (let i = 0; i < first; i++) cells.push(`<div class="cal-cell other"></div>`);
  for (let d = 1; d <= days; d++) {
    const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evs = byDay[iso] || [];
    const isToday = iso === todayISO();
    const shown = evs.slice(0, 4).map(p => `<div class="evt-pill" draggable="true" data-id="${p.id}" title="${esc(p.titulo)}" style="background:${postColor(p)}1a;color:${postColor(p)}"><span class="evt-dot" style="background:${postColor(p)}"></span>${esc(p.titulo)}</div>`).join('');
    const more = evs.length > 4 ? `<div class="cal-more">+${evs.length - 4}</div>` : '';
    cells.push(`<div class="cal-cell${isToday?' today':''}" data-day="${iso}"><div class="day-num">${d}</div>${shown}${more}</div>`);
  }
  while (cells.length % 7 !== 0) cells.push(`<div class="cal-cell other"></div>`);
  const root = $('#conteudoView');
  root.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin:2px 0 12px">
      <button class="btn subtle sm" id="pcPrev">‹</button>
      <button class="btn subtle sm" id="pcToday">Hoje</button>
      <button class="btn subtle sm" id="pcNext">›</button>
      <strong style="text-transform:capitalize">${monthName}</strong>
      <span class="sub" style="margin-left:auto">arraste um post para outro dia · clique num dia para agendar</span>
    </div>
    <div class="cal"><div class="cal-head">${WEEK.map(w => `<div>${w}</div>`).join('')}</div><div class="cal-grid">${cells.join('')}</div></div>`;
  $('#pcPrev').onclick = () => { postCal.m--; if (postCal.m < 0) { postCal.m = 11; postCal.y--; } renderMarketing(); };
  $('#pcNext').onclick = () => { postCal.m++; if (postCal.m > 11) { postCal.m = 0; postCal.y++; } renderMarketing(); };
  $('#pcToday').onclick = () => { const d = new Date(); postCal.y = d.getFullYear(); postCal.m = d.getMonth(); renderMarketing(); };
  root.querySelectorAll('.cal-cell[data-day]').forEach(c => c.onclick = e => { if (e.target.closest('.evt-pill')) return; postForm({ data: c.dataset.day, status: 'agendado' }); });
  root.querySelectorAll('.evt-pill[data-id]').forEach(p => p.onclick = () => openPostDetail(DB.get('posts', p.dataset.id)));
  wireDayDrag(root, 'posts', '.evt-pill[data-id]', renderMarketing, rec => (rec.status === 'ideia' ? { status: 'agendado' } : {}));
}
function postForm(rec = {}) {
  openModal(rec.id ? 'Editar post' : 'Novo post', `
    <input type="hidden" name="id" value="${esc(rec.id||'')}">
    <div class="field"><label>Título / tema *</label><input name="titulo" required value="${esc(rec.titulo||'')}" placeholder="Ex.: Antes e depois — Escritório AT"></div>
    <div class="field-row">
      <div class="field"><label>Formato</label><select name="formato">${options(T.formato, rec.formato||'post')}</select></div>
      <div class="field"><label>Canal</label><select name="canal">${options(T.canal, rec.canal||'instagram')}</select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Data</label><input name="data" type="date" value="${esc(rec.data||todayISO())}"></div>
      <div class="field"><label>Status</label><select name="status">${options(T.postStatus, rec.status||'ideia')}</select></div>
    </div>
    <div class="field"><label>Legenda</label><textarea name="legenda" placeholder="Texto do post…">${esc(rec.legenda||'')}</textarea></div>
    <div class="field-row">
      <div class="field"><label>Alcance</label><input name="alcance" type="number" min="0" value="${rec.alcance??''}" placeholder="0"></div>
      <div class="field"><label>Curtidas</label><input name="curtidas" type="number" min="0" value="${rec.curtidas??''}" placeholder="0"></div>
    </div>
    <div class="field"><label>Notas</label><textarea name="notas" placeholder="Ideias, referências…">${esc(rec.notas||'')}</textarea></div>
    ${rec.id?`<button type="button" class="btn subtle sm" id="postDel" style="color:var(--danger)">Excluir</button>`:''}
  `, async fd => { await DB.upsert('posts', { ...rec, ...fd }); renderMarketing(); toast(rec.id?'Post atualizado.':'Post criado.'); });
  const del = $('#postDel');
  if (del) del.onclick = async () => { if (!confirm('Excluir este item?')) return; await DB.remove('posts', rec.id); $('#modalRoot').innerHTML=''; renderMarketing(); toast('Item removido.'); };
}
function renderCampanhas() {
  const camps = DB.all('campanhas').slice().sort((a,b)=>(b.created_at||0)-(a.created_at||0));
  const ativas = camps.filter(c=>c.status==='ativa').length;
  const investTot = camps.reduce((s,c)=>s+(Number(c.investimento)||0),0);
  const leadsTot = camps.reduce((s,c)=>s+(Number(c.leads)||0),0);
  view().innerHTML = `
    <section class="grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat-card"><div class="label">Campanhas ativas</div><div class="value">${ativas}</div></div>
      <div class="stat-card"><div class="label">Investido</div><div class="value">${fmtMoney(investTot)}</div></div>
      <div class="stat-card"><div class="label">Leads gerados</div><div class="value ok">${leadsTot}</div></div>
    </section>
    <div class="card"><div class="table-wrap">
    ${camps.length ? `<table>
      <thead><tr><th>Campanha</th><th>Canal</th><th>Período</th><th>Status</th><th class="num">Investido</th><th class="num">Leads</th><th></th></tr></thead>
      <tbody>${camps.map(c=>`
        <tr>
          <td class="strong">${esc(c.nome)}${c.objetivo?`<div class="sub">${esc(c.objetivo)}</div>`:''}</td>
          <td>${T.canal[c.canal]||'—'}</td>
          <td>${c.inicio?fmtDate(c.inicio):'—'}${c.fim?(' – '+fmtDate(c.fim)):''}</td>
          <td>${badge(CAMP_BADGE[c.status]||'neutral', T.campStatus[c.status]||c.status)}</td>
          <td class="num">${fmtMoney(c.investimento)}</td>
          <td class="num">${c.leads?Number(c.leads).toLocaleString('pt-BR'):'—'}</td>
          <td class="actions">
            <button class="icon-btn" data-edit="${c.id}">Editar</button>
            <button class="icon-btn danger" data-del="${c.id}">Excluir</button>
          </td>
        </tr>`).join('')}</tbody>
    </table>` : `<div class="empty"><strong>Nenhuma campanha.</strong>Cadastre campanhas para medir investimento e retorno.</div>`}
    </div></div>`;
  view().querySelectorAll('[data-edit]').forEach(b => b.onclick = () => campanhaForm(DB.get('campanhas', b.dataset.edit)));
  view().querySelectorAll('[data-del]').forEach(b => b.onclick = () => { const c = DB.get('campanhas', b.dataset.del); confirmDelete(c.nome, async () => { await DB.remove('campanhas', c.id); renderMarketing(); toast('Campanha removida.'); }); });
}
function campanhaForm(rec = {}) {
  openModal(rec.id ? 'Editar campanha' : 'Nova campanha', `
    <input type="hidden" name="id" value="${esc(rec.id||'')}">
    <div class="field"><label>Nome *</label><input name="nome" required value="${esc(rec.nome||'')}" placeholder="Ex.: Impulsionamento — Reformas"></div>
    <div class="field-row">
      <div class="field"><label>Canal</label><select name="canal">${options(T.canal, rec.canal||'instagram')}</select></div>
      <div class="field"><label>Status</label><select name="status">${options(T.campStatus, rec.status||'planejada')}</select></div>
    </div>
    <div class="field"><label>Objetivo</label><input name="objetivo" value="${esc(rec.objetivo||'')}" placeholder="Ex.: Gerar leads de reforma"></div>
    <div class="field-row">
      <div class="field"><label>Início</label><input name="inicio" type="date" value="${esc(rec.inicio||'')}"></div>
      <div class="field"><label>Fim</label><input name="fim" type="date" value="${esc(rec.fim||'')}"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Investimento (R$)</label><input name="investimento" type="number" step="0.01" min="0" value="${rec.investimento??''}" placeholder="0,00"></div>
      <div class="field"><label>Leads gerados</label><input name="leads" type="number" min="0" value="${rec.leads??''}" placeholder="0"></div>
    </div>
    <div class="field"><label>Alcance</label><input name="alcance" type="number" min="0" value="${rec.alcance??''}" placeholder="0"></div>
    <div class="field"><label>Notas</label><textarea name="notas" placeholder="Resultados, aprendizados…">${esc(rec.notas||'')}</textarea></div>
  `, async fd => { await DB.upsert('campanhas', { ...rec, ...fd }); renderMarketing(); toast(rec.id?'Campanha atualizada.':'Campanha criada.'); });
}

/* ============================================================
   ROUTER
   ============================================================ */
const ROUTES = {
  dashboard: renderDashboard,
  projetos: renderProjetos,
  financeiro: renderFinanceiro,
  calendario: renderCalendario,
  clientes: renderClientes,
  marketing: renderMarketing,
};
function currentRoute() {
  const h = location.hash.replace(/^#\/?/, '');
  return ROUTES[h] ? h : 'dashboard';
}
function router() {
  const r = currentRoute();
  document.querySelectorAll('#nav a').forEach(a => a.classList.toggle('active', a.getAttribute('href') === `#/${r}`));
  $('#modalRoot').innerHTML = '';
  ROUTES[r]();
}
window.addEventListener('hashchange', router);

/* ---------- Data tools ---------- */
$('#btnExport').onclick = () => {
  const backup = { projetos: DB.data.projetos, financeiro: DB.data.financeiro, eventos: DB.data.eventos, leads: DB.data.leads };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `gece-admin-${todayISO()}.json`;
  a.click(); URL.revokeObjectURL(a.href);
  toast('Backup exportado.');
};
$('#btnLogout').onclick = async () => {
  try { await fetch('/api/logout', { method: 'POST' }); } catch {}
  location.href = '/login';
};

/* ---------- Boot ---------- */
(async () => {
  try {
    await DB.load();
    if (!location.hash) location.hash = '#/dashboard';
    router();
  } catch (e) {
    if (e.message !== 'unauth') {
      $('#view').innerHTML = `<div class="empty"><strong>Não foi possível carregar os dados.</strong>${esc(e.message||'')}</div>`;
    }
  }
})();
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}</script>
