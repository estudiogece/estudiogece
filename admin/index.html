<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Estúdio Gecê — Admin</title>
<link rel="icon" type="image/svg+xml" href="/assets/img/selo-fullcolor.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<!-- Google Picker (seleção de arquivos/pastas do Drive) -->
<script src="https://apis.google.com/js/api.js" async defer></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bordeaux: #561624;
    --bordeaux-light: #7a2438;
    --cream: #FAF7F4;
    --ink: #211013;
    --muted: #8a7a7d;
    --line: #e8e0e1;
    --ok: #3f6b4f;
    --warn: #b3762c;
    --danger: #a13b3b;
    --blue: #3d6b8a;
    --radius: 10px;
    --shadow: 0 18px 40px -24px rgba(86,22,36,.45);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    display: flex;
    min-height: 100vh;
  }
  a { color: inherit; }

  /* Sidebar */
  .sidebar {
    width: 240px;
    background: var(--bordeaux);
    color: #fff;
    display: flex;
    flex-direction: column;
    padding: 28px 20px;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
  .logo-mark { width: 38px; height: 38px; object-fit: contain; display: block; }
  .logo-text { font-size: 14px; font-weight: 600; letter-spacing: 0.04em; }
  .logo-text span { display: block; font-size: 11px; font-weight: 400; opacity: 0.65; }
  nav { display: flex; flex-direction: column; gap: 4px; }
  nav a {
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    font-size: 14px; font-weight: 500;
    padding: 11px 14px;
    border-radius: var(--radius);
    display: flex; align-items: center; gap: 10px;
    transition: background 0.15s ease, color 0.15s ease;
  }
  nav a:hover { background: rgba(255,255,255,0.08); color: #fff; }
  nav a.active { background: #fff; color: var(--bordeaux); }
  nav a .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.5; }
  .sidebar-footer { margin-top: auto; font-size: 12px; color: rgba(255,255,255,0.5); padding-top: 20px; }
  .sidebar-footer .name { color: rgba(255,255,255,0.75); font-weight: 500; }
  .data-tools { display: flex; gap: 6px; margin-top: 14px; flex-wrap: wrap; }
  .data-tools button {
    font-family: inherit; font-size: 10.5px; letter-spacing: .04em; text-transform: uppercase;
    background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7);
    border: none; border-radius: 6px; padding: 6px 8px; cursor: pointer;
    transition: background .15s ease, color .15s ease;
  }
  .data-tools button:hover { background: rgba(255,255,255,0.16); color: #fff; }

  /* Main */
  main { flex: 1; padding: 36px 44px; max-width: 1240px; width: 100%; }
  header.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; gap: 16px; flex-wrap: wrap; }
  header.topbar h1 { font-size: 22px; font-weight: 700; }
  .topbar-actions { display: flex; align-items: center; gap: 10px; }
  .date { font-size: 13px; color: var(--muted); }

  /* Buttons */
  .btn {
    font-family: inherit; font-size: 13.5px; font-weight: 600;
    background: var(--bordeaux); color: #fff;
    border: 1px solid var(--bordeaux); border-radius: var(--radius);
    padding: 10px 16px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 7px;
    transition: background .15s ease, transform .1s ease;
  }
  .btn:hover { background: var(--bordeaux-light); }
  .btn:active { transform: translateY(1px); }
  .btn.ghost { background: #fff; color: var(--bordeaux); }
  .btn.ghost:hover { background: #f3ebec; }
  .btn.sm { padding: 7px 12px; font-size: 12.5px; }
  .btn.subtle { background: transparent; border-color: var(--line); color: var(--ink); }
  .btn.subtle:hover { background: #f3ebec; }
  .icon-btn {
    background: none; border: none; cursor: pointer; color: var(--muted);
    font-size: 14px; padding: 5px 7px; border-radius: 6px; font-family: inherit;
    transition: background .15s ease, color .15s ease;
  }
  .icon-btn:hover { background: #f3ebec; color: var(--ink); }
  .icon-btn.danger:hover { background: #f6dede; color: var(--danger); }

  /* Cards / stats */
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); padding: 18px 20px; }
  .stat-card .label { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 8px; }
  .stat-card .value { font-size: 26px; font-weight: 700; }
  .stat-card .value.warn { color: var(--warn); }
  .stat-card .value.ok { color: var(--ok); }
  .stat-card .value.danger { color: var(--danger); }

  .panels { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; }
  .panel { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); padding: 22px; }
  .panel h2 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .panel .panel-sub { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  .row-item { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--line); font-size: 13.5px; }
  .row-item:last-child { border-bottom: none; }
  .row-item .name { font-weight: 500; }
  .row-item .meta { color: var(--muted); font-size: 12px; }

  /* Badges */
  .badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; display: inline-block; }
  .badge.neutral   { background: #eee7e8; color: var(--muted); }
  .badge.proposta  { background: #eee7e8; color: var(--muted); }
  .badge.andamento { background: #e4ecf0; color: var(--blue); }
  .badge.negociacao{ background: #fbe9d9; color: var(--warn); }
  .badge.novo      { background: #e4ecf0; color: var(--blue); }
  .badge.pausado   { background: #fbe9d9; color: var(--warn); }
  .badge.pendente  { background: #fbe9d9; color: var(--warn); }
  .badge.atrasado  { background: #f6dede; color: var(--danger); }
  .badge.perdido   { background: #f6dede; color: var(--danger); }
  .badge.pago      { background: #e2ede5; color: var(--ok); }
  .badge.concluido { background: #e2ede5; color: var(--ok); }
  .badge.ganho     { background: #e2ede5; color: var(--ok); }
  .badge.receita   { background: #e2ede5; color: var(--ok); }
  .badge.despesa   { background: #f6dede; color: var(--danger); }

  /* Tables */
  .card { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
  .table-wrap { width: 100%; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  thead th {
    text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--muted); padding: 14px 18px; border-bottom: 1px solid var(--line); background: #fbf8f6; white-space: nowrap;
  }
  tbody td { padding: 14px 18px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #fdfbfa; }
  td.strong { font-weight: 600; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  th.num { text-align: right; }
  td.actions { text-align: right; white-space: nowrap; }
  .sub { color: var(--muted); font-size: 12px; }

  .empty { color: var(--muted); font-size: 13.5px; padding: 44px 24px; text-align: center; }
  .empty strong { display: block; color: var(--ink); font-weight: 600; margin-bottom: 6px; font-size: 15px; }

  /* Filter bar */
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .toolbar input[type=search], .toolbar select {
    font-family: inherit; font-size: 13px; padding: 9px 12px;
    border: 1px solid var(--line); border-radius: var(--radius); background: #fff; color: var(--ink);
  }
  .toolbar input[type=search] { min-width: 220px; }
  .toolbar .spacer { flex: 1; }

  /* Modal */
  .overlay {
    position: fixed; inset: 0; background: rgba(33,16,19,.42);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 48px 20px; z-index: 50; overflow-y: auto;
  }
  .modal { background: #fff; border-radius: 14px; width: 100%; max-width: 560px; box-shadow: var(--shadow); animation: pop .16s ease; }
  @keyframes pop { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .modal-head { display: flex; justify-content: space-between; align-items: center; padding: 22px 26px; border-bottom: 1px solid var(--line); }
  .modal-head h3 { font-size: 17px; font-weight: 700; }
  .modal-body { padding: 22px 26px; }
  .modal-foot { display: flex; justify-content: flex-end; gap: 10px; padding: 18px 26px; border-top: 1px solid var(--line); }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12.5px; font-weight: 600; margin-bottom: 6px; color: var(--ink); }
  .field input, .field select, .field textarea {
    width: 100%; font-family: inherit; font-size: 14px; color: var(--ink);
    padding: 10px 12px; border: 1px solid var(--line); border-radius: var(--radius); background: #fff;
  }
  .field textarea { resize: vertical; min-height: 72px; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--bordeaux); box-shadow: 0 0 0 3px rgba(86,22,36,.1); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* Pagamentos / parcelas */
  .pay-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 18px; }
  .pay-summary > div { background: #fbf8f6; border: 1px solid var(--line); border-radius: var(--radius); padding: 12px 14px; }
  .pay-summary .k { font-size: 11px; text-transform: uppercase; letter-spacing: .03em; color: var(--muted); font-weight: 600; margin-bottom: 4px; }
  .pay-summary .v { font-size: 18px; font-weight: 700; }
  .pay-summary .v.ok { color: var(--ok); } .pay-summary .v.warn { color: var(--warn); }
  .pay-list { display: flex; flex-direction: column; margin-bottom: 18px; }
  .pay-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--line); }
  .pay-row:last-child { border-bottom: none; }
  .pay-row input { font-family: inherit; font-size: 12.5px; padding: 7px 8px; border: 1px solid var(--line); border-radius: 8px; color: var(--ink); }
  .pay-desc { flex: 1 1 150px; } .pay-venc { flex: 0 0 140px; } .pay-val { flex: 0 0 96px; }
  .pay-gen { border-top: 1px solid var(--line); padding-top: 16px; }
  .pay-gen-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; }

  /* Calendar */
  .cal { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
  .cal-head { display: grid; grid-template-columns: repeat(7,1fr); background: #fbf8f6; border-bottom: 1px solid var(--line); }
  .cal-head div { padding: 10px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); text-align: center; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); }
  .cal-cell { min-height: 104px; border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 8px; cursor: pointer; position: relative; transition: background .12s ease; }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell:hover { background: #fdfbfa; }
  .cal-cell.other { background: #faf7f6; color: var(--muted); cursor: default; }
  .cal-cell.other:hover { background: #faf7f6; }
  .cal-cell .day-num { font-size: 12.5px; font-weight: 600; margin-bottom: 5px; }
  .cal-cell.today .day-num { background: var(--bordeaux); color: #fff; width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; }
  .evt-pill { font-size: 11px; padding: 3px 7px; border-radius: 5px; margin-bottom: 3px; background: #f1e6e8; color: var(--bordeaux); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
  .evt-pill .t { opacity: .7; margin-right: 4px; }
  .cal-more { font-size: 10.5px; color: var(--muted); font-weight: 600; }

  /* Alternador Mês/Semana */
  .seg { display: inline-flex; border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
  .seg-btn { font-family: inherit; font-size: 12.5px; font-weight: 600; background: #fff; color: var(--ink); border: none; padding: 8px 14px; cursor: pointer; transition: background .12s ease; }
  .seg-btn:hover { background: #f3ebec; }
  .seg-btn.active { background: var(--bordeaux); color: #fff; }
  .seg-btn.active:hover { background: var(--bordeaux); }
  /* Visão semanal */
  .wk-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .wk-col { min-height: 340px; border-right: 1px solid var(--line); cursor: pointer; transition: background .12s ease; }
  .wk-col:last-child { border-right: none; }
  .wk-col:hover { background: #fdfbfa; }
  .wk-head { text-align: center; padding: 10px 4px; border-bottom: 1px solid var(--line); }
  .wk-col.today .wk-head { background: var(--bordeaux); color: #fff; }
  .wk-dow { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
  .wk-col.today .wk-dow { color: rgba(255,255,255,.8); }
  .wk-dnum { font-size: 18px; font-weight: 700; }
  .wk-body { padding: 8px; display: flex; flex-direction: column; gap: 4px; }
  .wk-body .evt-pill { white-space: normal; }
  @media (max-width: 680px) {
    .wk-grid { grid-template-columns: 1fr; }
    .wk-col { min-height: auto; border-right: none; border-bottom: 1px solid var(--line); display: flex; align-items: stretch; }
    .wk-head { border-bottom: none; border-right: 1px solid var(--line); min-width: 72px; display: flex; flex-direction: column; justify-content: center; }
    .wk-body { flex: 1; }
  }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: #fff; padding: 12px 20px; border-radius: 999px; font-size: 13.5px; font-weight: 500;
    opacity: 0; pointer-events: none; transition: opacity .2s ease, transform .2s ease; z-index: 80;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 900px) {
    body { flex-direction: column; }
    .sidebar { width: 100%; height: auto; position: static; flex-direction: row; align-items: center; padding: 14px 18px; gap: 18px; }
    .logo { margin-bottom: 0; }
    nav { flex-direction: row; flex-wrap: wrap; gap: 2px; }
    nav a { padding: 8px 11px; }
    nav a .dot { display: none; }
    .sidebar-footer, .data-tools { display: none; }
    main { padding: 24px 20px; }
    .grid { grid-template-columns: repeat(2,1fr); }
    .panels { grid-template-columns: 1fr; }
    .field-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

  <aside class="sidebar">
    <div class="logo">
      <img class="logo-mark" src="/assets/img/selo-branca.svg" alt="Estúdio Gecê" />
      <div class="logo-text">ESTÚDIO GECÊ<span>Painel Admin</span></div>
    </div>
    <nav id="nav">
      <a href="#/dashboard"><span class="dot"></span> Dashboard</a>
      <a href="#/projetos"><span class="dot"></span> Projetos</a>
      <a href="#/financeiro"><span class="dot"></span> Financeiro</a>
      <a href="#/calendario"><span class="dot"></span> Calendário</a>
      <a href="#/leads"><span class="dot"></span> Leads</a>
      <a href="#/clientes"><span class="dot"></span> Clientes</a>
    </nav>
    <div class="sidebar-footer">
      <span class="name">Gabriel Câmara</span><br>Arquiteto e Urbanista
      <div class="data-tools">
        <button id="btnExport">Exportar</button>
        <button id="btnLogout">Sair</button>
      </div>
    </div>
  </aside>

  <main>
    <header class="topbar">
      <h1 id="pageTitle">Dashboard</h1>
      <div class="topbar-actions" id="pageActions"></div>
    </header>
    <div id="view"></div>
  </main>

  <div id="modalRoot"></div>
  <div class="toast" id="toast"></div>

<script>
/* ============================================================
   Estúdio Gecê — Painel Admin (SPA, localStorage)
   ============================================================ */

/* ---------- Helpers ---------- */
const $ = (s, r=document) => r.querySelector(s);
const uid = () => (crypto.randomUUID ? crypto.randomUUID() : 'id-' + Date.now() + Math.random().toString(16).slice(2));
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const BRL = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
const fmtMoney = v => BRL.format(Number(v) || 0);
const todayISO = () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().slice(0,10); };
const fmtDate = iso => iso ? new Date(iso + 'T00:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' }) : '—';
const fmtDateFull = iso => iso ? new Date(iso + 'T00:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' }) : '—';

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ---------- Labels ---------- */
const T = {
  tipologia:   { residencial:'Residencial', comercial:'Comercial', interiores:'Interiores', urbanistico:'Urbanístico', reforma:'Reforma', consultoria:'Consultoria' },
  projStatus:  { proposta:'Proposta', andamento:'Em andamento', pausado:'Pausado', concluido:'Concluído' },
  fase:        { estudo:'Estudo preliminar', anteprojeto:'Anteprojeto', executivo:'Projeto executivo', obra:'Obra / acompanhamento', entregue:'Entregue' },
  finTipo:     { receita:'Receita', despesa:'Despesa' },
  finStatus:   { pendente:'Pendente', pago:'Pago', atrasado:'Atrasado' },
  leadStatus:  { novo:'Novo', negociacao:'Em negociação', ganho:'Ganho', perdido:'Perdido' },
  evtTipo:     { reuniao:'Reunião', visita:'Visita técnica', entrega:'Entrega', obra:'Obra', outro:'Outro' },
};
const options = (map, sel) => Object.entries(map).map(([v,l]) => `<option value="${v}"${v===sel?' selected':''}>${l}</option>`).join('');
const badge = (cls, label) => `<span class="badge ${cls}">${label}</span>`;

/* ---------- API (Cloudflare Worker + D1) ---------- */
async function api(method, path, body) {
  const res = await fetch('/api' + path, {
    method,
    headers: body ? { 'content-type': 'application/json' } : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 401) { location.href = '/login'; throw new Error('unauth'); }
  const data = await res.json().catch(() => ({}));
  if (!res.ok || data.ok === false) throw new Error(data.error || 'Erro na requisição.');
  return data;
}

/* ---------- Data layer (cache local espelhando o D1) ---------- */
const DB = {
  data: { projetos: [], financeiro: [], eventos: [], leads: [], clientes: [] },
  cols: ['projetos','financeiro','eventos','leads','clientes'],
  async load() {
    const d = await api('GET', '/admin/data');
    this.cols.forEach(c => { this.data[c] = Array.isArray(d[c]) ? d[c] : []; });
    return this;
  },
  all(c) { return this.data[c] || []; },
  get(c, id) { return (this.data[c] || []).find(x => x.id === id); },
  async upsert(c, rec) {
    if (rec.id) await api('PUT', `/admin/${c}/${rec.id}`, rec);
    else await api('POST', `/admin/${c}`, rec);
    await this.load();
    return true;
  },
  async remove(c, id) { await api('DELETE', `/admin/${c}/${id}`); await this.load(); },
};

/* Effective financeiro status: pendente + vencido => atrasado */
const effFinStatus = f => (f.status === 'pendente' && f.vencimento && f.vencimento < todayISO()) ? 'atrasado' : f.status;
const projName = id => { const p = DB.get('projetos', id); return p ? p.nome : '—'; };
const linkHost = u => { try { return new URL(u).hostname.replace(/^www\./,''); } catch { return u; } };

/* ---------- Google Drive Picker ----------
   Preencha apiKey e clientId (obtidos no Google Cloud Console) para ligar o
   botão "Escolher no Google Drive". Vazio = botão fica oculto (só link manual). */
const GDRIVE = {
  apiKey: 'AIzaSyDBUVl1FJ1ksFJsR766cjooYbMNpYF5HRQ',  // API key (Google Picker API)
  clientId: '893374859773-8k5v800igkl51c6qr948st78h0ls5ngp.apps.googleusercontent.com',
  scope: 'https://www.googleapis.com/auth/drive.readonly',
  token: null, tokenClient: null, pickerReady: false, onPick: null,
  enabled() { return !!(this.apiKey && this.clientId); },
  ready() { return !!(window.google && google.accounts && google.accounts.oauth2 && window.gapi); },
  choose(onPick) {
    if (!this.enabled()) return;
    this.onPick = onPick;
    if (!this.ready()) { toast('Google Drive ainda carregando — tente de novo em 1s.'); return; }
    if (!this.tokenClient) {
      this.tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: this.clientId, scope: this.scope,
        callback: (r) => { if (r && r.access_token) { this.token = r.access_token; this.show(); } },
      });
    }
    if (this.token) this.show();
    else this.tokenClient.requestAccessToken({ prompt: '' });
  },
  show() {
    if (!this.pickerReady) { gapi.load('picker', () => { this.pickerReady = true; this.show(); }); return; }
    const files = new google.picker.DocsView().setIncludeFolders(true).setSelectFolderEnabled(true);
    const folders = new google.picker.DocsView(google.picker.ViewId.FOLDERS).setSelectFolderEnabled(true);
    const picker = new google.picker.PickerBuilder()
      .setDeveloperKey(this.apiKey)
      .setOAuthToken(this.token)
      .addView(files)
      .addView(folders)
      .setCallback((data) => {
        if (data.action === google.picker.Action.PICKED && data.docs && data.docs[0]) {
          const d = data.docs[0];
          this.onPick && this.onPick(d.name, d.url || `https://drive.google.com/open?id=${d.id}`);
        }
      })
      .build();
    picker.setVisible(true);
  },
};

                <div class="field"><label>Valor de cada (R$)</label><input name="valor" type="number" step="0.01" min="0" placeholder="0,00" required></div>
              </div>
              <div class="field-row">
                <div class="field"><label>1º vencimento</label><input name="inicio" type="date" value="${todayISO()}" required></div>
                <div class="field"><label>Descrição</label><input name="base" value="Parcela"></div>

            </form>

      } catch (e) { toast(e.message || 'Erro.'); }

    root.querySelectorAll('[data-toggle]').forEach(b => b.onclick = async () => {
      const f = DB.get('financeiro', b.dataset.toggle);

      await draw(); toast(f.status === 'pago' ? 'Parcela reaberta.' : 'Parcela quitada.');
    });

      if (!confirm('Remover esta parcela?')) return;
      await DB.remove('financeiro', b.dataset.del); await draw(); toast('Parcela removida.');
    });

      e.preventDefault();
      const fd = Object.fromEntries(new FormData(e.target).entries());

      const base = fd.base || 'Parcela';
      const btn = e.target.querySelector('button[type=submit]'); btn.disabled = true; btn.textContent = 'Gerando…';

      } catch (err) { toast(err.message || 'Erro ao gerar.'); btn.disabled = false; btn.textContent = 'Gerar parcelas mensais'; }
    };
  }
  draw();
}

/* ---------- Modal ---------- */
function openModal(title, bodyHTML, onSubmit, submitLabel = 'Salvar') {
  const root = $('#modalRoot');
  root.innerHTML = `
    <div class="overlay" id="overlay">
      <form class="modal" id="modalForm" autocomplete="off">
        <div class="modal-head">
          <h3>${esc(title)}</h3>
          <button type="button" class="icon-btn" id="modalClose" aria-label="Fechar">✕</button>
        </div>
        <div class="modal-body">${bodyHTML}</div>
        <div class="modal-foot">
          <button type="button" class="btn subtle" id="modalCancel">Cancelar</button>
          <button type="submit" class="btn">${esc(submitLabel)}</button>
        </div>
      </form>
    </div>`;
  const close = () => { root.innerHTML = ''; };
  $('#modalClose').onclick = close;
  $('#modalCancel').onclick = close;
  $('#overlay').onclick = e => { if (e.target.id === 'overlay') close(); };
  document.addEventListener('keydown', function esc2(e){ if(e.key==='Escape'){ close(); document.removeEventListener('keydown', esc2);} });
  $('#modalForm').onsubmit = async e => {
    e.preventDefault();
    const submitBtn = e.target.querySelector('.btn[type=submit]');
    const fd = Object.fromEntries(new FormData(e.target).entries());
    if (submitBtn) { submitBtn.disabled = true; }
    try {
      const r = await onSubmit(fd);
      if (r !== false) close();
    } catch (err) {
      toast(err.message || 'Erro ao salvar.');
    } finally {
      if (submitBtn) submitBtn.disabled = false;
    }
  };
  const first = root.querySelector('input,select,textarea');
  if (first) first.focus();
}

function confirmDelete(label, onYes) {
  openModal('Remover', `<p style="font-size:14px;color:var(--ink)">Tem certeza que deseja remover <strong>${esc(label)}</strong>? Esta ação não pode ser desfeita.</p>`,
    async () => { await onYes(); return true; }, 'Remover');
  // recolor submit as danger
  const btn = $('#modalForm .btn[type=submit]');
  if (btn) { btn.style.background = 'var(--danger)'; btn.style.borderColor = 'var(--danger)'; }
}

    </div>
    <div class="field-row">
      <div class="field"><label>Vencimento</label><input name="vencimento" type="date" value="${esc(rec.vencimento||todayISO())}"></div>

    <div class="field"><label>Projeto vinculado</label><select name="projetoId">${projOpts}</select></div>
  `, async fd => { await DB.upsert('financeiro', { ...rec, ...fd }); renderFinanceiro(); toast(rec.id?'Lançamento atualizado.':'Lançamento registrado.'); });

/* ---------- Calendário ---------- */
const WEEK = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
let calState = { view: 'mes', y: new Date().getFullYear(), m: new Date().getMonth(), anchor: todayISO() };
const isoToDate = iso => new Date(iso + 'T00:00:00');
const dateToISO = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const shiftDays = (iso, n) => { const d = isoToDate(iso); d.setDate(d.getDate()+n); return dateToISO(d); };
const weekStart = iso => { const d = isoToDate(iso); d.setDate(d.getDate()-d.getDay()); return dateToISO(d); };
const shiftMonths = (iso, n) => { const d = isoToDate(iso); d.setMonth(d.getMonth()+n); return dateToISO(d); };

function renderCalendario() {
  $('#pageTitle').textContent = 'Calendário';
  setActions(`
    <div class="seg">
      <button class="seg-btn${calState.view==='mes'?' active':''}" id="calMes">Mês</button>
      <button class="seg-btn${calState.view==='semana'?' active':''}" id="calSemana">Semana</button>
    </div>
    <button class="btn subtle sm" id="calPrev">‹</button>
    <button class="btn subtle sm" id="calToday">Hoje</button>
    <button class="btn subtle sm" id="calNext">›</button>
    <button class="btn" id="novoEvento">+ Novo evento</button>`);

  if (calState.view === 'semana') renderCalWeek(); else renderCalMonth();

  $('#calMes').onclick = () => { calState.view = 'mes'; renderCalendario(); };
  $('#calSemana').onclick = () => { calState.view = 'semana'; renderCalendario(); };
  $('#calToday').onclick = () => { const d = new Date(); calState.y = d.getFullYear(); calState.m = d.getMonth(); calState.anchor = todayISO(); renderCalendario(); };
  $('#novoEvento').onclick = () => eventoForm();
  if (calState.view === 'semana') {
    $('#calPrev').onclick = () => { calState.anchor = shiftDays(weekStart(calState.anchor), -7); renderCalendario(); };
    $('#calNext').onclick = () => { calState.anchor = shiftDays(weekStart(calState.anchor), 7); renderCalendario(); };
  } else {
    $('#calPrev').onclick = () => { calState.m--; if (calState.m < 0){ calState.m = 11; calState.y--; } renderCalendario(); };
    $('#calNext').onclick = () => { calState.m++; if (calState.m > 11){ calState.m = 0; calState.y++; } renderCalendario(); };
  }
}

function renderCalMonth() {
  const { y, m } = calState;
  const monthName = new Date(y, m, 1).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
  const first = new Date(y, m, 1).getDay();
  const days = new Date(y, m + 1, 0).getDate();
  const eventos = DB.all('eventos');
  const byDay = {};
  eventos.forEach(e => { (byDay[e.data] = byDay[e.data] || []).push(e); });

  const cells = [];
  for (let i = 0; i < first; i++) cells.push(`<div class="cal-cell other"></div>`);
  for (let d = 1; d <= days; d++) {
    const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evs = (byDay[iso] || []).sort((a,b)=>(a.hora||'').localeCompare(b.hora||''));
    const isToday = iso === todayISO();
    const shown = evs.slice(0, 3).map(e => `<div class="evt-pill" data-edit="${e.id}" title="${esc(e.titulo)}">${e.hora?`<span class="t">${e.hora}</span>`:''}${esc(e.titulo)}</div>`).join('');
    const more = evs.length > 3 ? `<div class="cal-more">+${evs.length - 3} mais</div>` : '';
    cells.push(`<div class="cal-cell${isToday?' today':''}" data-day="${iso}"><div class="day-num">${d}</div>${shown}${more}</div>`);
  }
  while (cells.length % 7 !== 0) cells.push(`<div class="cal-cell other"></div>`);

  view().innerHTML = `
    <div style="margin-bottom:14px;font-size:15px;font-weight:600;text-transform:capitalize">${monthName}</div>
    <div class="cal">
      <div class="cal-head">${WEEK.map(w => `<div>${w}</div>`).join('')}</div>
      <div class="cal-grid">${cells.join('')}</div>
    </div>`;
  view().querySelectorAll('.cal-cell[data-day]').forEach(c => c.onclick = e => { if (e.target.closest('.evt-pill')) return; eventoForm({ data: c.dataset.day }); });
  view().querySelectorAll('.evt-pill[data-edit]').forEach(p => p.onclick = () => eventoForm(DB.get('eventos', p.dataset.edit)));
}

function renderCalWeek() {
  const start = weekStart(calState.anchor);
  const days = Array.from({ length: 7 }, (_, i) => shiftDays(start, i));
  const eventos = DB.all('eventos');
  const byDay = {};
  eventos.forEach(e => { (byDay[e.data] = byDay[e.data] || []).push(e); });
  const sd = isoToDate(days[0]), ed = isoToDate(days[6]);
  const label = `${sd.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})} – ${ed.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'})}`;

  const cols = days.map(iso => {
    const d = isoToDate(iso);
    const evs = (byDay[iso] || []).sort((a,b)=>(a.hora||'').localeCompare(b.hora||''));
    const isToday = iso === todayISO();
    return `<div class="wk-col${isToday?' today':''}" data-day="${iso}">
      <div class="wk-head"><span class="wk-dow">${WEEK[d.getDay()]}</span><span class="wk-dnum">${d.getDate()}</span></div>
      <div class="wk-body">${evs.map(e => `<div class="evt-pill" data-edit="${e.id}" title="${esc(e.titulo)}">${e.hora?`<span class="t">${e.hora}</span>`:''}${esc(e.titulo)}</div>`).join('')}</div>
    </div>`;
  }).join('');

  view().innerHTML = `
    <div style="margin-bottom:14px;font-size:15px;font-weight:600;text-transform:capitalize">${label}</div>
    <div class="cal wk-grid">${cols}</div>`;
  view().querySelectorAll('.wk-col[data-day]').forEach(c => c.onclick = e => { if (e.target.closest('.evt-pill')) return; eventoForm({ data: c.dataset.day }); });
  view().querySelectorAll('.evt-pill[data-edit]').forEach(p => p.onclick = () => eventoForm(DB.get('eventos', p.dataset.edit)));
}
function eventoForm(rec = {}) {
  const projOpts = `<option value="">— Nenhum —</option>` + DB.all('projetos').map(p => `<option value="${p.id}"${p.id===rec.projetoId?' selected':''}>${esc(p.nome)}</option>`).join('');
  openModal(rec.id ? 'Editar evento' : 'Novo evento', `
    <input type="hidden" name="id" value="${esc(rec.id||'')}">
    <div class="field"><label>Título *</label><input name="titulo" required value="${esc(rec.titulo||'')}" placeholder="Ex.: Reunião de briefing"></div>
    <div class="field-row">
      <div class="field"><label>Data *</label><input name="data" type="date" required value="${esc(rec.data||todayISO())}"></div>
      <div class="field"><label>Hora</label><input name="hora" type="time" value="${esc(rec.hora||'')}"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Tipo</label><select name="tipo">${options(T.evtTipo, rec.tipo||'reuniao')}</select></div>
      <div class="field"><label>Projeto vinculado</label><select name="projetoId">${projOpts}</select></div>
    </div>
    <div class="field"><label>Notas</label><textarea name="notas" placeholder="Local, participantes, pauta…">${esc(rec.notas||'')}</textarea></div>
    ${rec.id?`<button type="button" class="btn subtle sm" id="evtDel" style="color:var(--danger)">Excluir evento</button>`:''}
  `, async fd => { await DB.upsert('eventos', { ...rec, ...fd }); renderCalendario(); toast(rec.id?'Evento atualizado.':'Evento criado.'); });
  const del = $('#evtDel');
  if (del) del.onclick = async () => { await DB.remove('eventos', rec.id); $('#modalRoot').innerHTML=''; renderCalendario(); toast('Evento removido.'); };
}

/* ---------- Leads ---------- */
let leadFilter = { q: '', status: '' };
function renderLeads() {
  $('#pageTitle').textContent = 'Leads';
  setActions(`<button class="btn" id="novoLead">+ Novo lead</button>`);
  $('#novoLead').onclick = () => leadForm();

  let list = DB.all('leads').slice().sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  if (leadFilter.status) list = list.filter(l => l.status === leadFilter.status);
  if (leadFilter.q) { const q = leadFilter.q.toLowerCase(); list = list.filter(l => (l.nome+' '+(l.contato||'')).toLowerCase().includes(q)); }

  view().innerHTML = `
    <div class="toolbar">
      <input type="search" id="lq" placeholder="Buscar lead ou contato…" value="${esc(leadFilter.q)}">
      <select id="lstatus"><option value="">Todos os status</option>${options(T.leadStatus, leadFilter.status)}</select>
    </div>
    <div class="card"><div class="table-wrap">
    ${list.length ? `<table>
      <thead><tr><th>Nome</th><th>Contato</th><th>Origem</th><th>Interesse</th><th>Status</th><th class="num">Valor est.</th><th></th></tr></thead>
      <tbody>${list.map(l => `
        <tr>
          <td class="strong">${esc(l.nome)}</td>
          <td>${esc(l.contato||'—')}</td>
          <td>${esc(l.origem||'—')}</td>
          <td>${T.tipologia[l.interesse]||'—'}</td>
          <td>${badge(l.status, T.leadStatus[l.status]||l.status)}</td>
          <td class="num">${l.valor?fmtMoney(l.valor):'—'}</td>
          <td class="actions">
            <button class="icon-btn" data-edit="${l.id}">Editar</button>
            <button class="icon-btn danger" data-del="${l.id}">Excluir</button>
          </td>
        </tr>`).join('')}</tbody>
    </table>` : `<div class="empty"><strong>Nenhum lead ${leadFilter.q||leadFilter.status?'encontrado':'cadastrado'}.</strong>Registre contatos e oportunidades para acompanhar a negociação.</div>`}
    </div></div>`;

  $('#lq').oninput = e => { leadFilter.q = e.target.value; renderLeads(); const el=$('#lq'); el.focus(); el.setSelectionRange(el.value.length,el.value.length); };
  $('#lstatus').onchange = e => { leadFilter.status = e.target.value; renderLeads(); };
  view().querySelectorAll('[data-edit]').forEach(b => b.onclick = () => leadForm(DB.get('leads', b.dataset.edit)));
  view().querySelectorAll('[data-del]').forEach(b => b.onclick = () => { const l = DB.get('leads', b.dataset.del); confirmDelete(l.nome, async () => { await DB.remove('leads', l.id); renderLeads(); toast('Lead removido.'); }); });
}
function leadForm(rec = {}) {
  openModal(rec.id ? 'Editar lead' : 'Novo lead', `
    <input type="hidden" name="id" value="${esc(rec.id||'')}">
    <div class="field"><label>Nome *</label><input name="nome" required value="${esc(rec.nome||'')}" placeholder="Nome do contato"></div>
    <div class="field-row">
      <div class="field"><label>Contato</label><input name="contato" value="${esc(rec.contato||'')}" placeholder="Telefone ou e-mail"></div>
      <div class="field"><label>Origem</label><input name="origem" value="${esc(rec.origem||'')}" placeholder="Instagram, indicação…"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Interesse</label><select name="interesse">${options(T.tipologia, rec.interesse||'residencial')}</select></div>
      <div class="field"><label>Status</label><select name="status">${options(T.leadStatus, rec.status||'novo')}</select></div>
    </div>
    <div class="field"><label>Valor estimado (R$)</label><input name="valor" type="number" step="0.01" min="0" value="${rec.valor??''}" placeholder="0,00"></div>
    <div class="field"><label>Observações</label><textarea name="notas" placeholder="Necessidade, próximos passos…">${esc(rec.notas||'')}</textarea></div>
  `, async fd => { await DB.upsert('leads', { ...rec, ...fd }); renderLeads(); toast(rec.id?'Lead atualizado.':'Lead cadastrado.'); });
}

/* ---------- Clientes (contas que se cadastraram no portal) ---------- */
const waLink = tel => { const d = String(tel||'').replace(/\D/g,''); if (!d) return null; return `https://wa.me/${d.length<=11?'55'+d:d}`; };
function renderClientes() {
  $('#pageTitle').textContent = 'Clientes';
  setActions('');
  const clientes = DB.all('clientes');
  const projetos = DB.all('projetos');
  view().innerHTML = `
    <div class="panel" style="margin-bottom:18px">
      <div class="panel-sub" style="margin:0">Contas criadas pelos clientes no portal (<strong>/registrar</strong>). Vincule uma conta a um projeto pela tela <strong>Projetos</strong> para que o cliente passe a enxergá-lo em <strong>/portal</strong>.</div>
    </div>
    <div class="card"><div class="table-wrap">
    ${clientes.length ? `<table>
      <thead><tr><th>Nome</th><th>Contato</th><th>Situação</th><th>Projetos</th><th></th></tr></thead>
      <tbody>${clientes.map(c => {
        const seus = projetos.filter(p => p.clientId === c.id);
        const wa = waLink(c.telefone);
        return `<tr>
          <td class="strong">${esc(c.name)}${c.ativo===0?' <span class="badge perdido">desativada</span>':''}</td>
          <td>
            <div>${esc(c.email)}</div>
            <div class="sub">${c.telefone?esc(c.telefone):'—'}${wa?` · <a href="${wa}" target="_blank" rel="noopener" style="color:var(--ok);text-decoration:none;font-weight:600">WhatsApp</a>`:''}</div>
          </td>
          <td>${c.ativo===0?'<span class="sub">Inativa</span>':'<span class="badge ganho">Ativa</span>'}</td>
          <td>${seus.length ? seus.map(p => `<span class="badge andamento" style="margin:2px 4px 2px 0">${esc(p.nome)}</span>`).join('') : '<span class="sub">Nenhum</span>'}</td>
          <td class="actions">
            <button class="icon-btn" data-edit-cli="${c.id}">Editar</button>
            <button class="icon-btn" data-senha="${c.id}">Resetar senha</button>
            <button class="icon-btn danger" data-del-cli="${c.id}">Excluir</button>
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table>` : `<div class="empty"><strong>Nenhum cliente cadastrado ainda.</strong>Quando um cliente criar conta em /registrar, ele aparece aqui.</div>`}
    </div></div>`;

  view().querySelectorAll('[data-edit-cli]').forEach(b => b.onclick = () => clienteForm(DB.get('clientes', b.dataset.editCli)));
  view().querySelectorAll('[data-senha]').forEach(b => b.onclick = () => resetSenha(DB.get('clientes', b.dataset.senha)));
  view().querySelectorAll('[data-del-cli]').forEach(b => b.onclick = () => {
    const c = DB.get('clientes', b.dataset.delCli);
    confirmDelete(`o cliente ${c.name}`, async () => { await api('DELETE', `/admin/clientes/${c.id}`); await DB.load(); renderClientes(); toast('Cliente removido.'); });
  });
}
function clienteForm(c) {
  openModal('Editar cliente', `
    <div class="field"><label>Nome *</label><input name="name" required value="${esc(c.name)}"></div>
    <div class="field-row">
      <div class="field"><label>E-mail *</label><input name="email" type="email" required value="${esc(c.email)}"></div>
      <div class="field"><label>Telefone / WhatsApp</label><input name="telefone" value="${esc(c.telefone||'')}" placeholder="(79) 99999-0000"></div>
    </div>
    <div class="field"><label>Situação da conta</label><select name="ativo">
      <option value="1"${c.ativo!==0?' selected':''}>Ativa</option>
      <option value="0"${c.ativo===0?' selected':''}>Desativada (não consegue entrar)</option>
    </select></div>
  `, async fd => {
    await api('PUT', `/admin/clientes/${c.id}`, { name: fd.name, email: fd.email, telefone: fd.telefone, ativo: fd.ativo });
    await DB.load(); renderClientes(); toast('Cliente atualizado.');
  });
}
async function resetSenha(c) {
  if (!confirm(`Gerar uma nova senha para ${c.name}? A senha atual deixa de funcionar.`)) return;
  try {
    const r = await api('POST', `/admin/clientes/${c.id}/senha`);
    openModal('Nova senha gerada', `
      <p style="font-size:14px">Nova senha de <strong>${esc(c.name)}</strong>:</p>
      <p style="font-size:24px;font-weight:700;letter-spacing:1px;color:var(--bordeaux);margin:14px 0">${esc(r.senha)}</p>
      <p class="sub">Copie e repasse ao cliente. Também enviamos por e-mail para ${esc(c.email)}.</p>
    `, () => true, 'Ok');
  } catch (e) { toast(e.message || 'Erro ao resetar senha.'); }
}

/* ============================================================
   ROUTER
   ============================================================ */
const ROUTES = {
  dashboard: renderDashboard,
  projetos: renderProjetos,
  financeiro: renderFinanceiro,
  calendario: renderCalendario,
  leads: renderLeads,
  clientes: renderClientes,
};
function currentRoute() {
  const h = location.hash.replace(/^#\/?/, '');
  return ROUTES[h] ? h : 'dashboard';
}
function router() {
  const r = currentRoute();
  document.querySelectorAll('#nav a').forEach(a => a.classList.toggle('active', a.getAttribute('href') === `#/${r}`));
  $('#modalRoot').innerHTML = '';
  ROUTES[r]();
}
window.addEventListener('hashchange', router);

/* ---------- Data tools ---------- */
$('#btnExport').onclick = () => {
  const backup = { projetos: DB.data.projetos, financeiro: DB.data.financeiro, eventos: DB.data.eventos, leads: DB.data.leads };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `gece-admin-${todayISO()}.json`;
  a.click(); URL.revokeObjectURL(a.href);
  toast('Backup exportado.');
};
$('#btnLogout').onclick = async () => {
  try { await fetch('/api/logout', { method: 'POST' }); } catch {}
  location.href = '/login';
};

/* ---------- Boot ---------- */
(async () => {
  try {
    await DB.load();
    if (!location.hash) location.hash = '#/dashboard';
    router();
  } catch (e) {
    if (e.message !== 'unauth') {
      $('#view').innerHTML = `<div class="empty"><strong>Não foi possível carregar os dados.</strong>${esc(e.message||'')}</div>`;
    }
  }
})();
</script>
